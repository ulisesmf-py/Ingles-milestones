<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milestones Educa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
/* ============================================================
   MILESTONES EDUCA — Design System
   Psychology: warm energy (orange/coral), focus (deep blue),
   growth (green), curiosity (purple). High contrast, readable.
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap');

:root {
  /* Core palette — energetic & pedagogically proven */
  --primary:     #4F46E5;   /* indigo — focus, trust */
  --primary-d:   #3730A3;
  --primary-l:   #EEF2FF;
  --accent:      #F97316;   /* orange — energy, attention */
  --accent-d:    #EA6000;
  --accent-l:    #FFF4E6;
  --success:     #10B981;   /* emerald — growth, correct */
  --success-d:   #059669;
  --success-l:   #ECFDF5;
  --danger:      #EF4444;
  --danger-d:    #B91C1C;
  --danger-l:    #FEF2F2;
  --warning:     #F59E0B;
  --warning-l:   #FFFBEB;
  --purple:      #8B5CF6;
  --purple-d:    #6D28D9;
  --purple-l:    #F5F3FF;
  --pink:        #EC4899;
  --pink-l:      #FDF2F8;
  --cyan:        #06B6D4;
  --cyan-l:      #ECFEFF;

  /* Neutral */
  --gray-50:  #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-400: #9CA3AF;
  --gray-600: #4B5563;
  --gray-800: #1F2937;
  --gray-900: #111827;

  /* Layout */
  --sidebar-w: 264px;
  --radius-sm: 8px;
  --radius:    14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 16px rgba(79,70,229,.1), 0 2px 6px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 40px rgba(79,70,229,.15), 0 4px 12px rgba(0,0,0,.08);
  --shadow-glow: 0 0 0 3px rgba(79,70,229,.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}
h1,h2,h3,h4 { font-family: 'Fredoka', cursive; font-weight: 600; letter-spacing: .3px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

/* ============================================================
   SIDEBAR
   ============================================================ */
#sidebar {
  position: fixed; left: 0; top: 0;
  width: var(--sidebar-w); height: 100vh;
  background: linear-gradient(175deg, #0F0C29 0%, #302B63 50%, #24243e 100%);
  display: flex; flex-direction: column;
  z-index: 200; overflow-y: auto;
  box-shadow: 4px 0 24px rgba(0,0,0,.3);
}
#sidebar::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
#sidebar .brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  position: relative;
}
#sidebar nav { flex: 1; padding: 10px 10px; }
#sidebar nav a {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 14px;
  color: rgba(255,255,255,.7);
  text-decoration: none; font-size: .88rem; font-weight: 700;
  border-radius: var(--radius-sm);
  transition: all .2s; cursor: pointer;
  margin-bottom: 2px; position: relative;
}
#sidebar nav a:hover {
  background: rgba(255,255,255,.1);
  color: #fff;
  transform: translateX(3px);
}
#sidebar nav a.active {
  background: linear-gradient(90deg, var(--accent), var(--primary));
  color: #fff;
  box-shadow: 0 4px 12px rgba(249,115,22,.35);
}
#sidebar nav a .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
#sidebar .sidebar-footer {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: .75rem;
}
#sidebar .user-badge {
  margin: 8px 10px;
  padding: 12px 14px;
  background: rgba(255,255,255,.07);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,.1);
}
#sidebar .user-badge .uname { font-weight: 800; font-size: .9rem; color: #fff; }
#sidebar .user-badge .urole { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: 2px; }

/* ============================================================
   MAIN AREA
   ============================================================ */
#main { margin-left: var(--sidebar-w); min-height: 100vh; padding: 24px 28px; }

#topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
  background: #fff;
  padding: 14px 20px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
}
#topbar h1 { font-size: 1.5rem; color: var(--gray-900); }
#topbar .topbar-right { display: flex; align-items: center; gap: 10px; }

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 22px 24px;
  border: 1px solid var(--gray-200);
  transition: box-shadow .2s;
}
.card:hover { box-shadow: var(--shadow); }

.stat-card {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 22px;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
  transition: all .25s;
  cursor: default;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.stat-icon {
  width: 54px; height: 54px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; flex-shrink: 0;
}
.stat-val { font-size: 2rem; font-weight: 900; line-height: 1; font-family: 'Fredoka', cursive; }
.stat-lbl { font-size: .78rem; color: var(--gray-400); margin-top: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

/* ── GRID HELPERS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

/* ============================================================
   BUTTONS — high contrast, energy-driven
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: .875rem; cursor: pointer; border: none;
  transition: all .18s; text-decoration: none;
  line-height: 1.2; letter-spacing: .2px;
  position: relative; overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0);
  transition: background .15s;
}
.btn:hover::after { background: rgba(255,255,255,.15); }
.btn:active { transform: scale(.97); }

.btn-primary   { background: linear-gradient(135deg, var(--primary), #6366F1); color: #fff; box-shadow: 0 4px 12px rgba(79,70,229,.3); }
.btn-primary:hover { box-shadow: 0 6px 20px rgba(79,70,229,.4); transform: translateY(-1px); }

.btn-success   { background: linear-gradient(135deg, var(--success), #34D399); color: #fff; box-shadow: 0 4px 12px rgba(16,185,129,.3); }
.btn-success:hover { box-shadow: 0 6px 20px rgba(16,185,129,.4); transform: translateY(-1px); }

.btn-danger    { background: linear-gradient(135deg, var(--danger), #F87171); color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,.3); }
.btn-danger:hover { box-shadow: 0 6px 20px rgba(239,68,68,.4); transform: translateY(-1px); }

.btn-warning   { background: linear-gradient(135deg, var(--warning), #FCD34D); color: #fff; box-shadow: 0 4px 12px rgba(245,158,11,.3); }
.btn-warning:hover { transform: translateY(-1px); }

.btn-orange    { background: linear-gradient(135deg, var(--accent), #FB923C); color: #fff; box-shadow: 0 4px 12px rgba(249,115,22,.3); }
.btn-orange:hover { box-shadow: 0 6px 20px rgba(249,115,22,.4); transform: translateY(-1px); }

.btn-purple    { background: linear-gradient(135deg, var(--purple), #A78BFA); color: #fff; box-shadow: 0 4px 12px rgba(139,92,246,.3); }
.btn-purple:hover { box-shadow: 0 6px 20px rgba(139,92,246,.4); transform: translateY(-1px); }

.btn-secondary {
  background: var(--gray-100); color: var(--gray-700, #374151);
  border: 1.5px solid var(--gray-200);
  box-shadow: none;
}
.btn-secondary:hover { background: var(--gray-200); color: var(--gray-900); transform: translateY(-1px); }

.btn-sm  { padding: 7px 14px; font-size: .8rem; }
.btn-xs  { padding: 5px 10px; font-size: .75rem; }

/* ============================================================
   BADGES
   ============================================================ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 11px; border-radius: 99px;
  font-size: .72rem; font-weight: 800; letter-spacing: .3px;
}
.badge-blue   { background: var(--primary-l); color: var(--primary-d); }
.badge-green  { background: var(--success-l); color: var(--success-d); }
.badge-red    { background: var(--danger-l);  color: var(--danger-d);  }
.badge-orange { background: var(--accent-l);  color: var(--accent-d);  }
.badge-purple { background: var(--purple-l);  color: var(--purple-d);  }
.badge-yellow { background: var(--warning-l); color: #92400E; }
.badge-gray   { background: var(--gray-100);  color: var(--gray-600);  }
.badge-pink   { background: var(--pink-l);    color: #9D174D; }
.badge-cyan   { background: var(--cyan-l);    color: #0E7490; }

/* ============================================================
   FORMS
   ============================================================ */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: .8rem; font-weight: 800; margin-bottom: 5px; color: var(--gray-600); text-transform: uppercase; letter-spacing: .4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 11px 14px;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif; font-size: .9rem;
  color: var(--gray-800);
  background: #fff;
  transition: border-color .18s, box-shadow .18s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}
.form-group textarea { resize: vertical; min-height: 90px; }

/* ============================================================
   TABLE
   ============================================================ */
table { width: 100%; border-collapse: collapse; font-size: .875rem; }
th {
  background: var(--gray-50); padding: 11px 16px;
  text-align: left; font-weight: 800; color: var(--gray-600);
  border-bottom: 2px solid var(--gray-200);
  font-size: .75rem; text-transform: uppercase; letter-spacing: .5px;
}
td { padding: 12px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
tr:hover td { background: #FAFBFF; }
tr:last-child td { border-bottom: none; }

/* ============================================================
   MODAL
   ============================================================ */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,12,41,.6);
  backdrop-filter: blur(6px);
  z-index: 1000; align-items: center; justify-content: center; padding: 20px;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: #fff; border-radius: var(--radius-lg);
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.3);
  animation: modalIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn { from { transform: scale(.9) translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
#modal-box .modal-header { padding: 22px 26px 16px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
#modal-box .modal-header h3 { font-size: 1.2rem; color: var(--gray-900); }
#modal-box .modal-body { padding: 22px 26px; }
#modal-box .modal-footer { padding: 16px 26px; border-top: 1px solid var(--gray-100); display: flex; gap: 10px; justify-content: flex-end; }
.close-btn { background: var(--gray-100); border: none; font-size: 1rem; cursor: pointer; color: var(--gray-600); line-height: 1; width: 30px; height: 30px; border-radius: 99px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.close-btn:hover { background: var(--danger-l); color: var(--danger); }

/* ============================================================
   TOAST
   ============================================================ */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 13px 20px; border-radius: var(--radius);
  font-size: .875rem; font-weight: 700;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
  display: flex; align-items: center; gap: 10px;
  animation: toastIn .3s cubic-bezier(.34,1.56,.64,1);
  min-width: 220px;
  border-left: 4px solid rgba(255,255,255,.4);
}
.toast         { background: var(--gray-900); color: #fff; }
.toast.success { background: linear-gradient(135deg, var(--success-d), var(--success)); }
.toast.error   { background: linear-gradient(135deg, var(--danger-d),  var(--danger)); }
.toast.warning { background: linear-gradient(135deg, #92400E, var(--warning)); }
@keyframes toastIn { from { transform: translateX(60px) scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }

/* ============================================================
   LOGIN SCREEN — animated background options
   ============================================================ */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
/* BG option 1 (default): animated gradient */
#login-screen.bg-1 { background: linear-gradient(-45deg, #0F0C29, #302B63, #4F46E5, #7C3AED, #EC4899, #F97316); background-size: 400% 400%; animation: gradientShift 10s ease infinite; }
/* BG option 2: floating particles (CSS-only stars) */
#login-screen.bg-2 { background: radial-gradient(ellipse at 20% 50%, #1a1a3e 0%, #0d0d1a 60%); }
/* BG option 3: aurora */
#login-screen.bg-3 { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
/* BG option 4: sunset */
#login-screen.bg-4 { background: linear-gradient(160deg, #0F0C29 0%, #6B21A8 40%, #DB2777 70%, #F97316 100%); background-size: 200% 200%; animation: gradientShift 8s ease infinite; }
/* BG option 5: ocean */
#login-screen.bg-5 { background: linear-gradient(-45deg, #0ea5e9, #0284c7, #4F46E5, #06B6D4); background-size: 300% 300%; animation: gradientShift 9s ease infinite; }

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating shapes behind login card */
.login-shape {
  position: absolute; border-radius: 50%; filter: blur(60px); opacity: .25; pointer-events: none;
  animation: floatShape 8s ease-in-out infinite;
}
.login-shape:nth-child(1) { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
.login-shape:nth-child(2) { width: 300px; height: 300px; background: var(--pink); bottom: -80px; right: -80px; animation-delay: -3s; }
.login-shape:nth-child(3) { width: 250px; height: 250px; background: var(--accent); top: 50%; left: 60%; animation-delay: -5s; }
@keyframes floatShape {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(20px,-20px) scale(1.08); }
  66%      { transform: translate(-15px,15px) scale(.95); }
}

/* Stars for bg-2 */
.star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur,2s) ease-in-out infinite; opacity: 0; }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:.9;transform:scale(1)} }

/* Login card */
/* ══ LOGIN ══ */
#login-screen {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}
.lc-wrap { width:100%; max-width:400px; position:relative; z-index:2; }

/* Tabs */
.lc-tabs {
  display:flex; background:rgba(0,0,0,.25);
  border-radius:14px 14px 0 0; overflow:hidden;
  border:1px solid rgba(255,255,255,.12); border-bottom:none;
}
.lc-tab {
  flex:1; padding:13px 10px;
  background:transparent; border:none;
  color:rgba(255,255,255,.45); font-family:'Nunito',sans-serif;
  font-size:.9rem; font-weight:700; cursor:pointer;
  transition:all .25s; letter-spacing:.3px;
}
.lc-tab.active {
  background:rgba(255,255,255,.1);
  color:#fff;
}
.lc-tab:hover:not(.active) { color:rgba(255,255,255,.7); background:rgba(255,255,255,.05); }

/* Card */
.lc-card {
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(22px) saturate(180%);
  border:1px solid rgba(255,255,255,.18);
  border-radius:0 0 18px 18px;
  padding:28px 30px 26px;
  box-shadow:0 20px 60px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
}
.app-name {
  font-family:'Fredoka',cursive; font-size:1.7rem; font-weight:700;
  color:#fff; text-align:center; margin-bottom:2px;
  text-shadow:0 2px 10px rgba(0,0,0,.3);
}
.app-sub {
  color:rgba(255,255,255,.5); font-size:.78rem;
  text-align:center; margin-bottom:18px; font-weight:600;
}

/* Domain hint bar */
.lc-domain-hint {
  display:flex; align-items:center; gap:7px;
  border:1px solid; border-radius:8px;
  padding:7px 12px; margin-bottom:14px;
  font-size:.78rem; letter-spacing:.3px;
}

/* Input with suffix */
.lc-field-wrap {
  position:relative; margin-bottom:10px;
}
.lc-field-wrap input {
  width:100%; padding:12px 14px;
  padding-right:170px;
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.2);
  border-radius:10px; font-size:.93rem;
  font-family:'Nunito',sans-serif; color:#fff;
  transition:border .2s, background .2s;
  box-sizing:border-box;
}
.lc-field-wrap input:focus { outline:none; border-color:rgba(255,255,255,.6); background:rgba(255,255,255,.16); }
.lc-domain-suffix {
  position:absolute; right:12px; top:50%;
  transform:translateY(-50%);
  font-size:.72rem; color:rgba(255,255,255,.4);
  font-weight:700; pointer-events:none;
  white-space:nowrap;
}
.lc-card input[type="password"] {
  width:100%; padding:12px 14px;
  background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.2);
  border-radius:10px; font-size:.93rem;
  font-family:'Nunito',sans-serif; color:#fff;
  margin-bottom:4px;
  transition:border .2s, background .2s;
  box-sizing:border-box;
}
.lc-card input[type="password"]:focus { outline:none; border-color:rgba(255,255,255,.6); background:rgba(255,255,255,.16); }
.lc-card input::placeholder { color:rgba(255,255,255,.4); }

/* ── Inputs alumno: azul fuerte siempre ── */
#panel-s .lc-field-wrap input,
#panel-s input[type="password"] {
  background: rgba(29,78,216,0.35) !important;
  border-color: rgba(93,130,246,.5) !important;
  color: #fff !important;
}
#panel-s .lc-field-wrap input:focus,
#panel-s input[type="password"]:focus {
  background: rgba(29,78,216,0.55) !important;
  border-color: rgba(147,197,253,.8) !important;
}
/* ── Inputs maestro: rojo siempre ── */
#panel-t .lc-field-wrap input,
#panel-t input[type="password"] {
  background: rgba(185,28,28,0.35) !important;
  border-color: rgba(220,38,38,.5) !important;
  color: #fff !important;
}
#panel-t .lc-field-wrap input:focus,
#panel-t input[type="password"]:focus {
  background: rgba(185,28,28,0.55) !important;
  border-color: rgba(252,165,165,.8) !important;
}
/* ── Autofill alumno (azul fuerte) ── */
#panel-s .lc-field-wrap input:-webkit-autofill,
#panel-s .lc-field-wrap input:-webkit-autofill:hover,
#panel-s .lc-field-wrap input:-webkit-autofill:focus,
#panel-s input[type="password"]:-webkit-autofill,
#panel-s input[type="password"]:-webkit-autofill:hover,
#panel-s input[type="password"]:-webkit-autofill:focus {
  -webkit-text-fill-color: #ffffff !important;
  -webkit-box-shadow: 0 0 0px 1000px rgba(29,78,216,0.6) inset !important;
  box-shadow: 0 0 0px 1000px rgba(29,78,216,0.6) inset !important;
  border-color: rgba(93,130,246,.6) !important;
  caret-color: #ffffff;
  transition: background-color 99999s ease-in-out 0s;
}
/* ── Autofill maestro (rojo) ── */
#panel-t .lc-field-wrap input:-webkit-autofill,
#panel-t .lc-field-wrap input:-webkit-autofill:hover,
#panel-t .lc-field-wrap input:-webkit-autofill:focus,
#panel-t input[type="password"]:-webkit-autofill,
#panel-t input[type="password"]:-webkit-autofill:hover,
#panel-t input[type="password"]:-webkit-autofill:focus {
  -webkit-text-fill-color: #ffffff !important;
  -webkit-box-shadow: 0 0 0px 1000px rgba(185,28,28,0.6) inset !important;
  box-shadow: 0 0 0px 1000px rgba(185,28,28,0.6) inset !important;
  border-color: rgba(220,38,38,.6) !important;
  caret-color: #ffffff;
  transition: background-color 99999s ease-in-out 0s;
}
/* Firefox dark mode */
.lc-field-wrap input,
.lc-card input[type="password"] {
  color-scheme: dark;
}

/* Error */
.lc-err {
  color:#FCA5A5; font-size:.78rem; min-height:18px;
  margin-bottom:8px; font-weight:700; text-align:center;
}

/* Remember toggle */
.lc-remember {
  display:flex; align-items:center; gap:8px;
  cursor:pointer; margin-bottom:14px;
  user-select:none; justify-content:center;
}
.lc-remember span { font-size:.76rem; color:rgba(255,255,255,.55); font-weight:700; }
.lc-toggle {
  width:36px; height:20px; border-radius:99px;
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.2);
  position:relative; cursor:pointer;
  transition:background .25s; flex-shrink:0;
}
.lc-knob {
  width:14px; height:14px; border-radius:50%; background:#fff;
  position:absolute; top:2px; left:2px;
  transition:transform .25s; box-shadow:0 1px 4px rgba(0,0,0,.3);
}

/* Buttons */
.btn-login {
  width:100%; padding:13px;
  border:none; border-radius:10px;
  font-family:'Fredoka',cursive; font-size:1.05rem; font-weight:600;
  cursor:pointer; transition:all .2s; letter-spacing:.3px; color:#fff;
}
.btn-student {
  background:linear-gradient(135deg,#1d4ed8,#1e40af);
  box-shadow:0 5px 18px rgba(29,78,216,.5);
}
.btn-student:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(29,78,216,.7); }
.btn-teacher {
  background:linear-gradient(135deg,#dc2626,#b91c1c);
  box-shadow:0 5px 18px rgba(220,38,38,.5);
}
.btn-teacher:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(220,38,38,.7); }
.btn-login:active { transform:scale(.98); }
.btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }

/* legacy compat */
.login-card { display:none; }
.lc-scene { display:none; }

/* BG switcher */
.bg-switcher {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 10;
}
.bg-dot {
  width: 12px; height: 12px; border-radius: 50%; cursor: pointer;
  border: 2px solid rgba(255,255,255,.5);
  transition: all .2s;
}
.bg-dot.active, .bg-dot:hover { transform: scale(1.4); border-color: #fff; }
.bg-dot:nth-child(1) { background: linear-gradient(135deg, #4F46E5, #EC4899); }
.bg-dot:nth-child(2) { background: #1a1a3e; }
.bg-dot:nth-child(3) { background: linear-gradient(135deg, #0f2027, #2c5364); }
.bg-dot:nth-child(4) { background: linear-gradient(135deg, #6B21A8, #DB2777); }
.bg-dot:nth-child(5) { background: linear-gradient(135deg, #0ea5e9, #06B6D4); }

/* ============================================================
   TOPIC CARDS — student practice
   ============================================================ */
.topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 16px; }
.topic-card {
  border-radius: var(--radius);
  padding: 22px 18px;
  cursor: pointer;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 10px;
  border: 2px solid transparent;
  position: relative; overflow: hidden;
}
.topic-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,0));
  pointer-events: none;
}
.topic-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: var(--shadow-lg); }
.topic-card .tc-icon { font-size: 2.6rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
.topic-card .tc-title { font-weight: 800; font-size: .95rem; }
.topic-card .tc-prog { font-size: .75rem; opacity: .8; }
.tc-blue   { background: linear-gradient(135deg, #4F46E5, #818CF8); color: #fff; }
.tc-orange { background: linear-gradient(135deg, #F97316, #FBBF24); color: #fff; }
.tc-green  { background: linear-gradient(135deg, #10B981, #34D399); color: #fff; }
.tc-purple { background: linear-gradient(135deg, #8B5CF6, #C084FC); color: #fff; }
.tc-red    { background: linear-gradient(135deg, #EF4444, #F87171); color: #fff; }

/* ============================================================
   MODULE CARDS
   ============================================================ */
.module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px,1fr)); gap: 14px; }
.module-card {
  background: #fff; border-radius: var(--radius); padding: 20px 16px;
  cursor: pointer; text-align: center;
  box-shadow: var(--shadow-sm);
  border: 2px solid var(--gray-100);
  transition: all .22s cubic-bezier(.34,1.56,.64,1);
}
.module-card:hover {
  border-color: var(--primary); transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(79,70,229,.2);
}
.module-card .mod-icon { font-size: 2.2rem; margin-bottom: 10px; }
.module-card .mod-name { font-weight: 800; font-size: .88rem; color: var(--gray-900); }
.module-card .mod-desc { font-size: .75rem; color: var(--gray-400); margin-top: 4px; }

/* ============================================================
   EXERCISE ENGINE
   ============================================================ */
.ex-container { max-width: 740px; margin: 0 auto; }
.ex-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 12px; }
.progress-bar { flex: 1; height: 12px; background: var(--gray-100); border-radius: 99px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,.1); }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--purple), var(--pink)); border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.ex-card { background: #fff; border-radius: var(--radius-lg); padding: 30px; box-shadow: var(--shadow); min-height: 320px; border: 1px solid var(--gray-100); }
.ex-question { font-size: 1.15rem; font-weight: 800; margin-bottom: 20px; line-height: 1.55; color: var(--gray-900); }

.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.option-btn {
  padding: 14px 16px;
  border: 2px solid var(--gray-200); border-radius: var(--radius-sm);
  background: #fff; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .9rem;
  transition: all .18s; text-align: left;
  color: var(--gray-800);
}
.option-btn:hover { border-color: var(--primary); background: var(--primary-l); color: var(--primary-d); transform: translateY(-1px); }
.option-btn.correct { border-color: var(--success); background: var(--success-l); color: var(--success-d); }
.option-btn.wrong   { border-color: var(--danger);  background: var(--danger-l);  color: var(--danger-d);  }

.fill-input {
  width: 100%; padding: 14px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif; font-size: 1rem; color: var(--gray-800);
  transition: border .18s, box-shadow .18s;
}
.fill-input:focus { outline: none; border-color: var(--primary); box-shadow: var(--shadow-glow); }

.word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.word-chip {
  padding: 8px 16px;
  border: 2px solid var(--primary);
  border-radius: 99px; cursor: pointer;
  font-weight: 800; font-size: .85rem;
  background: var(--primary-l); color: var(--primary-d);
  transition: all .15s;
}
.word-chip:hover { background: var(--primary); color: #fff; transform: translateY(-1px); }
.word-chip.used { opacity: .3; pointer-events: none; }

.sentence-builder {
  min-height: 54px; border: 2px dashed var(--gray-200); border-radius: var(--radius-sm);
  padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  background: var(--gray-50); margin: 12px 0;
}
.sb-word { padding: 7px 14px; border-radius: 99px; background: linear-gradient(135deg,var(--primary),#6366F1); color: #fff; font-weight: 800; font-size: .85rem; cursor: pointer; transition: all .15s; }
.sb-word:hover { opacity: .75; transform: scale(.97); }

.error-word { padding: 6px 13px; border-radius: var(--radius-sm); border: 2px solid transparent; cursor: pointer; font-weight: 700; margin: 3px; transition: all .15s; color: var(--gray-800); }
.error-word:hover { border-color: var(--danger); background: var(--danger-l); }
.error-word.selected-error { border-color: var(--danger); background: var(--danger-l); color: var(--danger-d); }

.feedback-box { padding: 14px 18px; border-radius: var(--radius-sm); margin-top: 16px; font-weight: 700; font-size: .95rem; display: flex; align-items: center; gap: 10px; }
.feedback-box.ok  { background: var(--success-l); color: var(--success-d); border-left: 4px solid var(--success); }
.feedback-box.bad { background: var(--danger-l);  color: var(--danger-d);  border-left: 4px solid var(--danger); }

.result-card { text-align: center; padding: 48px 24px; }
.result-score { font-size: 4.5rem; font-family: 'Fredoka', cursive; font-weight: 700; margin: 10px 0; color: var(--primary); }
.result-stars { font-size: 2.8rem; letter-spacing: 5px; margin: 10px 0; }

/* ============================================================
   VOCAB FLASHCARDS
   ============================================================ */
.vocab-scene { perspective: 1200px; width: 300px; height: 210px; margin: 0 auto 24px; }
.vocab-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .65s cubic-bezier(.4,0,.2,1); cursor: pointer; }
.vocab-card.flipped { transform: rotateY(180deg); }
.vocab-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 24px; }
.vocab-front { background: linear-gradient(135deg, var(--primary), var(--purple)); color: #fff; box-shadow: var(--shadow-lg); }
.vocab-back  { background: linear-gradient(135deg, var(--accent), var(--warning)); color: #fff; transform: rotateY(180deg); box-shadow: var(--shadow-lg); }
.vocab-emoji { font-size: 3.2rem; }
.vocab-word  { font-family: 'Fredoka', cursive; font-size: 1.6rem; font-weight: 600; }
.vocab-hint  { font-size: .85rem; opacity: .85; }

/* ============================================================
   FORUM
   ============================================================ */
.forum-post { background: #fff; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); margin-bottom: 16px; border: 1px solid var(--gray-100); }
.forum-post .fp-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.forum-post .fp-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--purple));
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .95rem; flex-shrink: 0;
}
.forum-post .fp-meta { font-size: .77rem; color: var(--gray-400); margin-top: 2px; }
.forum-reply { margin-left: 44px; border-left: 3px solid var(--gray-100); padding-left: 16px; margin-top: 12px; }
.forum-reply .fr-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.forum-reply .fr-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--success), var(--cyan));
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 800; flex-shrink: 0;
}
.forum-reply.student-reply .fr-avatar { background: linear-gradient(135deg, var(--orange, #F97316), var(--pink)); }

/* ============================================================
   ATTENDANCE
   ============================================================ */
.att-btn { width: 38px; height: 38px; border-radius: var(--radius-sm); border: 2px solid var(--gray-200); cursor: pointer; font-size: 1.05rem; transition: all .15s; background: var(--gray-50); }
.att-btn:hover { transform: scale(1.1); }
.att-btn.active-P { background: var(--success); border-color: var(--success-d); box-shadow: 0 3px 8px rgba(16,185,129,.35); }
.att-btn.active-A { background: var(--danger);  border-color: var(--danger-d);  box-shadow: 0 3px 8px rgba(239,68,68,.35); }
.att-btn.active-T { background: var(--warning); border-color: #D97706; box-shadow: 0 3px 8px rgba(245,158,11,.35); }

/* ============================================================
   WELCOME BANNER
   ============================================================ */
.welcome-banner {
  background: linear-gradient(135deg, #0F0C29, #302B63, #4F46E5);
  color: #fff; border-radius: var(--radius-lg); padding: 28px 32px;
  margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 32px rgba(79,70,229,.3);
}
.welcome-banner::after {
  content: ''; position: absolute; right: -40px; top: -40px;
  width: 220px; height: 220px; border-radius: 50%;
  background: rgba(255,255,255,.05);
}
.welcome-banner h2 { font-size: 1.85rem; text-shadow: 0 2px 8px rgba(0,0,0,.2); }
.welcome-banner p  { opacity: .8; margin-top: 4px; font-weight: 600; }
.welcome-banner .wb-emoji { font-size: 3.8rem; position: relative; z-index: 1; animation: bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* ============================================================
   SECTION TITLES & MISC
   ============================================================ */
.section-title {
  font-size: 1.05rem; margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 2px solid var(--gray-100);
  display: flex; align-items: center; gap: 8px;
  color: var(--gray-900);
}
.empty-state { text-align: center; padding: 56px 24px; color: var(--gray-400); }
.empty-state .es-icon { font-size: 3.5rem; margin-bottom: 14px; display: block; }

.parcial-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.parcial-tab {
  padding: 8px 20px; border-radius: 99px;
  border: 2px solid var(--gray-200); cursor: pointer;
  font-weight: 800; font-size: .83rem;
  background: #fff; color: var(--gray-600);
  transition: all .18s;
}
.parcial-tab:hover { border-color: var(--primary); color: var(--primary); }
.parcial-tab.active { background: linear-gradient(135deg, var(--primary), var(--purple)); color: #fff; border-color: transparent; box-shadow: 0 3px 10px rgba(79,70,229,.3); }

.grade-input { width: 72px; padding: 7px 9px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-weight: 800; text-align: center; font-size: .9rem; color: var(--gray-800); }
.grade-input:focus { outline: none; border-color: var(--primary); }
.grade-avg { font-family: 'Fredoka', cursive; font-size: 1.4rem; font-weight: 600; }
.rubric-row { display: flex; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
.rubric-name { flex: 1; padding: 8px 10px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; }

.hidden { display: none !important; }
.flex { display: flex; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
.items-center { align-items: center; } .justify-between { justify-content: space-between; } .flex-wrap { flex-wrap: wrap; }
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-5{margin-top:20px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-5{margin-bottom:20px}
.text-sm{font-size:.85rem}.text-xs{font-size:.75rem}.text-gray{color:var(--gray-400)}.fw-bold{font-weight:800}
.text-center{text-align:center}.w-full{width:100%}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--gray-100);display:flex;gap:12px;align-items:flex-start}

/* ═══════════════════════════════════════════════════════
   MOBILE-FIRST RESPONSIVE — works on phones & tablets
   ═══════════════════════════════════════════════════════ */

/* Hamburger menu button — mobile only */
#hamburger-btn {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  color: #fff;
  font-size: 1.4rem;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 1100;
  background: rgba(79,70,229,.9);
  border-radius: 10px;
  width: 44px;
  height: 44px;
  align-items: center;
  justify-content: center;
}
/* Overlay for closing sidebar on mobile */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 900;
}

@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }

  #hamburger-btn { display: flex; }

  #sidebar {
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 1000;
    width: 260px !important;
    box-shadow: 4px 0 24px rgba(0,0,0,.4);
  }
  #sidebar.mobile-open {
    transform: translateX(0);
  }
  #sidebar-overlay.active { display: block; }

  #main {
    margin-left: 0 !important;
    padding: 16px 12px !important;
  }

  #topbar {
    padding: 10px 12px 10px 64px !important;
  }

  /* Grids → 1 or 2 columns on mobile */
  .topics-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px,1fr)) !important;
    gap: 10px !important;
  }
  .module-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px !important;
  }
  .grid-3 {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px !important;
  }
  .options-grid {
    grid-template-columns: 1fr !important;
    gap: 8px !important;
  }

  /* Cards & components */
  .card { padding: 16px 14px !important; }
  .topic-card { padding: 16px 12px !important; }
  .module-card { padding: 16px 12px !important; }
  .tc-icon { font-size: 2rem !important; }

  /* Exercise area */
  .ex-container { padding: 8px !important; }
  .ex-question { font-size: 1.1rem !important; }
  .option-btn {
    padding: 14px 16px !important;
    font-size: .95rem !important;
    text-align: left !important;
  }
  .word-chip {
    padding: 8px 14px !important;
    font-size: .85rem !important;
  }
  .fill-input {
    font-size: 1rem !important;
    padding: 12px 14px !important;
  }

  /* Topbar buttons */
  .topbar-parcial { font-size: .75rem !important; padding: 5px 8px !important; }

  /* Forms */
  .form-group input, .form-group select, .form-group textarea {
    font-size: 16px !important; /* prevent iOS zoom */
  }
  input, select, textarea { font-size: 16px !important; }

  /* Tables — horizontal scroll */
  table { font-size: .78rem !important; }
  th, td { padding: 8px 6px !important; }

  /* Buttons */
  .btn { padding: 9px 14px !important; font-size: .85rem !important; }
  .btn-sm { padding: 7px 10px !important; font-size: .78rem !important; }

  /* Match/listen activities */
  #sb-listen-bank { gap: 6px !important; }
  .sentence-builder { min-height: 48px !important; font-size: .9rem !important; }

  /* Welcome banner */
  .welcome-banner { padding: 20px 16px !important; }
  .welcome-banner h2 { font-size: 1.3rem !important; }

  /* Compose exercise */
  [style*="grid-template-columns:1fr 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }

  /* Image vocab grid */
  [style*="grid-template-columns:1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}

@media (max-width: 480px) {
  .topics-grid {
    grid-template-columns: 1fr 1fr !important;
  }
  .module-grid {
    grid-template-columns: 1fr 1fr !important;
  }
  .ex-question { font-size: 1rem !important; }
  .section-title { font-size: 1rem !important; }
}

/* Keyboard shortcut badges — only on desktop */
.kb-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  background: rgba(0,0,0,.12);
  border: 1px solid rgba(0,0,0,.18);
  border-radius: 4px;
  font-size: .65rem;
  font-weight: 800;
  margin-left: 6px;
  vertical-align: middle;
  color: inherit;
}
@media (max-width: 768px) {
  .kb-badge { display: none !important; }
}

@media (max-width: 768px) {
  .login-card {
    width: 90vw !important;
    max-width: 380px !important;
    padding: 28px 20px !important;
  }
  .login-title { font-size: 1.4rem !important; }
  .bg-dots { gap: 6px !important; }
}

<body>


<!-- LOGIN SCREEN -->
<div id="login-screen" class="bg-2">
  <div class="login-shape"></div>
  <div class="login-shape"></div>
  <div class="login-shape"></div>
  <div id="star-field"></div>

  <div class="lc-wrap">

    <!-- TAB SWITCHER -->
    <div class="lc-tabs">
      <button class="lc-tab active" id="tab-s" onclick="switchTab('s')">🎓 Alumno</button>
      <button class="lc-tab" id="tab-t" onclick="switchTab('t')">👨‍🏫 Maestro</button>
    </div>

  document.getElementById('tab-s').classList.toggle('active', role === 's');
  document.getElementById('tab-t').classList.toggle('active', role === 't');
  // panels
  document.getElementById('panel-s').style.display = role === 's' ? '' : 'none';
  document.getElementById('panel-t').style.display = role === 't' ? '' : 'none';
  // clear errors
  ['s','t'].forEach(r => { const e = document.getElementById('li-err-' + r); if(e) e.textContent = ''; });
}

function clearErr(role) {
  const e = document.getElementById('li-err-' + role);
  if (e) e.textContent = '';
}

function _applyToggle(role, on) {
  const toggle = document.getElementById('rem-toggle-' + role);
  const knob   = document.getElementById('rem-knob-' + role);
  if (!toggle || !knob) return;
  toggle.style.background = on
    ? (role === 't' ? 'linear-gradient(135deg,#dc2626,#b91c1c)' : 'linear-gradient(135deg,#1d4ed8,#1e40af)')
    : 'rgba(255,255,255,.15)';
  toggle.style.borderColor = on ? 'rgba(255,255,255,.4)' : 'rgba(255,255,255,.2)';
  knob.style.transform = on ? 'translateX(16px)' : 'translateX(0)';
}

function toggleRemember(role) {
  _rememberOn[role] = !_rememberOn[role];
  _applyToggle(role, _rememberOn[role]);
  if (!_rememberOn[role]) {
    localStorage.removeItem('ms_saved_user_' + role);
    localStorage.removeItem('ms_saved_pass_' + role);
  }
}

(function restoreSession() {
  const uT = localStorage.getItem('ms_saved_user_t');
  const pT = localStorage.getItem('ms_saved_pass_t');
  const uS = localStorage.getItem('ms_saved_user_s');
  const pS = localStorage.getItem('ms_saved_pass_s');

  // ALUMNO — panel-s visible por defecto, rellenar cuando el DOM cargue
  if (uS && pS) {
    const fillStudent = () => {
      const uEl = document.getElementById('li-user-s');
      const pEl = document.getElementById('li-pass-s');
      if (uEl) uEl.value = uS;
      if (pEl) pEl.value = pS;
      _rememberOn.s = true;
      _applyToggle('s', true);
    };
    if (document.readyState === 'complete') {
      fillStudent();
    } else {
      window.addEventListener('load', fillStudent);
    }
  }

  // MAESTRO — cambiar tab primero, luego rellenar
  if (uT && pT) {
    const fillTeacher = () => {
      switchTab('t');
      setTimeout(() => {
        const uEl = document.getElementById('li-user-t');
        const pEl = document.getElementById('li-pass-t');
        if (uEl) uEl.value = uT;
        if (pEl) pEl.value = pT;
        _rememberOn.t = true;
        _applyToggle('t', true);
      }, 60);
    };
    if (document.readyState === 'complete') {
      fillTeacher();
    } else {
      window.addEventListener('load', fillTeacher);
    }
  }
})();

const AUTH = firebase.auth();

async function doLogin(role){
  let u = (document.getElementById('li-user-' + role)?.value || '').trim();
  const p = (document.getElementById('li-pass-' + role)?.value || '').trim();
  // Limpiar dominio si lo escribieron completo
  u = u.replace(/@student\.blackai\.com$/i,'')
       .replace(/@master\.blackai\.com$/i,'')
       .replace(/@milestones\.app$/i,'').trim();

  const err = document.getElementById('li-err-' + role);
  const btn = document.getElementById('btn-login-' + role);
  if (err) err.textContent = '';
  if (!u || !p) { if(err) err.textContent = '⚠️ Completa usuario y contraseña.'; return; }

  const resetBtn = () => { if(btn){ btn.textContent='Entrar al Aula 🚀'; btn.disabled=false; btn.style.opacity='1'; } };
  if(btn){ btn.textContent='Verificando...'; btn.disabled=true; btn.style.opacity='.65'; }

  // ══════════════════════════════════════════
  // MAESTRO — verificar credenciales locales primero,
  // luego Firebase Auth
  // ══════════════════════════════════════════
  if (role === 't') {
    if (u !== ADMIN_USER || p !== ADMIN_PASS) {
      if(err) err.textContent = '⚠️ Usuario o contraseña incorrectos.';
      resetBtn(); return;
    }
    const email = ADMIN_USER + '@master.blackai.com';
    try {
      await AUTH.signInWithEmailAndPassword(email, p);
    } catch(e) {
      // Si no existe la cuenta en Firebase Auth, crearla
      if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
        try {
          await AUTH.createUserWithEmailAndPassword(email, p);
        } catch(e2) {
          // Si ya existe pero con error distinto, ignorar — el sistema igual funciona
          console.warn('Admin Firebase create:', e2.code);
        }
      } else {
        console.warn('Admin Firebase auth:', e.code, e.message);
      }
    }
    if (_rememberOn.t) {
      localStorage.setItem('ms_saved_user_t', u);
      localStorage.setItem('ms_saved_pass_t', p);
    }
    currentUser = { id:'admin', name:'Profesor', username:ADMIN_USER, role:'admin' };
    resetBtn();
    await startApp();
    return;
  }

  // ══════════════════════════════════════════
  // ALUMNO — primero autenticar en Firebase,
  // luego buscar en DB (ya autenticado)
  // ══════════════════════════════════════════
  try {
    // PASO 1: intentar Firebase Auth con ambos dominios
    let firebaseOk = false;
    let authError  = null;

    for (const email of [u + '@student.blackai.com', u + '@milestones.app']) {
      try {
        await AUTH.signInWithEmailAndPassword(email, p);
        firebaseOk = true;
        break;
      } catch(e) {
        authError = e;
        // Contraseña incorrecta — no seguir probando
        if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
          if(err) err.textContent = '⚠️ Contraseña incorrecta.';
          resetBtn(); return;
        }
        // Si no existe en este dominio, probar el siguiente
      }
    }

    if (!firebaseOk) {
      if(err) err.textContent = '⚠️ Cuenta no activada. Habla con tu maestro.';
      resetBtn(); return;
    }

    // PASO 2: ya autenticado, buscar en /students (raíz) y en /milestone/students
    let students = await DB.ref('students').once('value').then(s=>s.val());
    // Fallback: buscar también en milestone/students por si acaso
    if (!students) students = await dbGet('students');
    let rec = null, sid = null;
    if (students) {
      for (const [id, st] of Object.entries(students)) {
        if ((st.username || '').toLowerCase() === u.toLowerCase()) {
          rec = st; sid = id; break;
        }
      }
    }

    if (!rec) {
      // Está en Firebase Auth pero no en la DB — cerrar sesión
      AUTH.signOut().catch(()=>{});
      if(err) err.textContent = '⚠️ Usuario no registrado. Habla con tu maestro.';
      resetBtn(); return;
    }

    if (_rememberOn.s) {
      localStorage.setItem('ms_saved_user_s', u);
      localStorage.setItem('ms_saved_pass_s', p);
    }
    currentUser = { ...rec, id: sid };
    resetBtn();
    await startApp();

  } catch(e) {
    console.error('Login error:', e.code, e.message);
    AUTH.signOut().catch(()=>{});
    resetBtn();
    if(err) err.textContent = '⚠️ Error de conexión. Intenta de nuevo.';
  }
}

function renderVocabRow(item, i, topicId) {
  return `<div class="flex gap-2 items-center mb-3" id="vrow-${i}" style="padding:10px;background:#f8fafc;border-radius:10px;border:1px solid #e5e7eb;">
    <div style="width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#e5e7eb;display:flex;align-items:center;justify-content:center;">
      ${item.imageUrl
        ? `<img src="${item.imageUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='❌'">`
        : '<span style="font-size:1.5rem">🖼️</span>'}
    </div>
    <div style="flex:1;display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px;">
      <input placeholder="Palabra en inglés" value="${item.word||''}" id="vword-${i}"
        style="padding:7px 10px;border:2px solid #e5e7eb;border-radius:7px;font-family:Nunito,sans-serif;font-size:.85rem;">
      <input placeholder="Traducción (ES)" value="${item.es||''}" id="ves-${i}"
        style="padding:7px 10px;border:2px solid #e5e7eb;border-radius:7px;font-family:Nunito,sans-serif;font-size:.85rem;">
      <input placeholder="URL de imagen (https://...)" value="${item.imageUrl||''}" id="vimg-${i}"
        style="padding:7px 10px;border:2px solid #e5e7eb;border-radius:7px;font-family:Nunito,sans-serif;font-size:.85rem;"
        onchange="previewVocabImg(${i})">
    </div>
    <button class="btn btn-danger btn-xs" onclick="removeVocabRow(${i})">🗑️</button>
  </div>`;
}

function previewVocabImg(i) {
  const url = document.getElementById('vimg-' + i)?.value?.trim();
  const row = document.getElementById('vrow-' + i);
  if (!row || !url) return;
  const preview = row.querySelector('div');
  preview.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='❌'">`;
}

function addVocabItem(topicId) {
  window._act6State.vocabItems.push({ word: '', es: '', imageUrl: '' });
  const list = document.getElementById('vocab-items-list');
  const i = window._act6State.vocabItems.length - 1;
  const div = document.createElement('div');
  div.innerHTML = renderVocabRow({ word: '', es: '', imageUrl: '' }, i, topicId);
  list.appendChild(div.firstElementChild);
}

function removeVocabRow(i) {
  const row = document.getElementById('vrow-' + i);
  if (row) row.remove();
}

async function saveAct6(topicId) {
  const rows = document.querySelectorAll('[id^="vrow-"]');
  const vocabItems = [];
  rows.forEach((row, ri) => {
    const idx = row.id.replace('vrow-', '');
    const word = document.getElementById('vword-' + idx)?.value?.trim() || '';
    const es   = document.getElementById('ves-' + idx)?.value?.trim() || '';
    const imageUrl = document.getElementById('vimg-' + idx)?.value?.trim() || '';
    if (word) vocabItems.push({ word, es, imageUrl });
  });
  window._act6State.vocabItems = vocabItems;
  const saved = await dbGet('act6/' + topicId) || {};
  await dbSet('act6/' + topicId, { ...saved, vocab: vocabItems, updatedAt: new Date().toISOString() });
  toast('Vocabulario guardado ✅', 'success');
  openAct6Week(topicId);
}

function generatePrompt(topicId) {
  const topic = TOPICS.find(t => t.id === topicId);
  const rows = document.querySelectorAll('[id^="vrow-"]');
  const words = [];
  const wordPairs = [];
  rows.forEach(row => {
    const idx = row.id.replace('vrow-', '');
    const word = document.getElementById('vword-' + idx)?.value?.trim();
    const es   = document.getElementById('ves-' + idx)?.value?.trim();
    if (word) { words.push(es ? word + ' (' + es + ')' : word); wordPairs.push({en:word, es:es||''}); }
  });
  if (words.length === 0) { toast('Agrega vocabulario primero', 'error'); return; }

  const vocabAnswers = wordPairs.map(p => p.en + (p.es ? ' = ' + p.es : '')).join(', ');

  const prompt = [
    'You are an English teacher creating materials for Mexican secondary school students (A1.2 level, ages 12-14).',
    '',
    'TOPIC: "' + topic.title + '" — Grammar focus: ' + topic.grammar,
    'VOCABULARY: ' + words.join(', '),
    '',
    'TASK: Create a short reading comprehension activity.',
    'Respond ONLY with a valid JSON object. No extra text, no markdown, no backticks — raw JSON only.',
    '',
    'STRICT RULES:',

async function importReadingJSON(topicId) {
  const raw = document.getElementById('json-paste')?.value?.trim();
  if (!raw) { toast('Pega el JSON primero', 'error'); return; }

  let data;
  try {
    // Clean common AI artifacts
    const cleaned = raw
      .replace(/^```json\s*/i, '')
      .replace(/^```\s*/i, '')
      .replace(/```\s*$/i, '')
      .trim();
    data = JSON.parse(cleaned);
  } catch(e) {
    toast('JSON inválido. Verifica que no tenga texto extra antes o después.', 'error');
    document.getElementById('import-preview').innerHTML =
      `<div class="feedback-box bad">❌ Error al parsear: ${e.message}</div>`;
    return;
  }

  if (!data.reading || !Array.isArray(data.questions) || data.questions.length === 0) {
    toast('El JSON no tiene el formato correcto (falta "reading" o "questions")', 'error'); return;
  }

  // Validate questions
  const validQ = data.questions.every(q =>
    q.q && Array.isArray(q.opts) && q.opts.length === 4 && typeof q.ans === 'number'
  );
  if (!validQ) {
    toast('Algunas preguntas no tienen el formato correcto', 'error'); return;
  }

  // Save
  const saved = await dbGet('act6/' + topicId) || {};
  const imgUrl = document.getElementById('reading-img-url')?.value?.trim() || '';
  if (imgUrl) data.imageUrl = imgUrl;
  await dbSet('act6/' + topicId, { ...saved, reading: data, updatedAt: new Date().toISOString() });
  toast(`Lectura importada: ${data.questions.length} preguntas ✅`, 'success');

  document.getElementById('import-preview').innerHTML =
    `<div class="feedback-box ok">✅ Lectura importada con ${data.questions.length} preguntas. Ya está disponible para los alumnos.</div>`;

  // Show preview
  const previewArea = document.querySelector('#act6-editor-area > .card:last-child');
  if (previewArea) previewArea.outerHTML = renderReadingPreview(data, topicId);
  else openAct6Week(topicId);
}

function selectImgSlot(i) {
  const state = window._imgMatchState;
  if (!state || state.matched.includes(window._imgMatchItems[i]?.word)) return;
  SFX.click();
  window._imgMatchItems.forEach((_, j) => {
    const el = document.getElementById('imgslot-' + j);
    if (el && !state.matched.includes(window._imgMatchItems[j].word))
      el.style.borderColor = 'var(--gray-200)';
  });
  state.selectedImg = i;
  const el = document.getElementById('imgslot-' + i);
  if (el) el.style.borderColor = 'var(--primary)';
  if (state.selectedWord !== undefined) checkImgMatch();
}

function selectWordSlot(i, word) {
  const state = window._imgMatchState;
  if (!state) return;
  SFX.click();
  window._imgMatchShuffled.forEach((_, j) => {
    const el = document.getElementById('wordslot-' + j);
    if (el && !el.disabled) el.style.borderColor = 'var(--gray-200)';
  });
  state.selectedWord = i;
  state.selectedWordValue = word;
  const el = document.getElementById('wordslot-' + i);
  if (el) el.style.borderColor = 'var(--primary)';
  if (state.selectedImg !== undefined) checkImgMatch();
}

function checkImgMatch() {
  const state = window._imgMatchState;
  const imgIdx  = state.selectedImg;
  const wordVal = state.selectedWordValue;
  const wordIdx = state.selectedWord;
  if (imgIdx === undefined || wordIdx === undefined) return;
  const correctWord = window._imgMatchItems[imgIdx].word;
  const correct = wordVal === correctWord;
  const imgEl  = document.getElementById('imgslot-' + imgIdx);
  const wordEl = document.getElementById('wordslot-' + wordIdx);
  if (correct) {
    SFX.correct();
    state.matched.push(correctWord);
    if (imgEl)  { imgEl.style.borderColor='var(--success)'; imgEl.style.opacity='.7'; imgEl.style.pointerEvents='none'; imgEl.innerHTML+='<div style="position:absolute;inset:0;background:rgba(16,185,129,.35);display:flex;align-items:center;justify-content:center;font-size:2rem">✅</div>'; }
    if (wordEl) { wordEl.disabled=true; wordEl.style.borderColor='var(--success)'; wordEl.style.background='var(--success-l)'; wordEl.style.color='var(--success-d)'; wordEl.textContent='✅ '+wordVal; }
    const pct = Math.round((state.matched.length / state.total) * 100);
    const prog = document.getElementById('img-match-prog');
    const sc   = document.getElementById('img-match-score');
    if (prog) prog.style.width = pct + '%';
    if (sc)   sc.textContent = state.matched.length + '/' + state.total;
    if (state.matched.length >= state.total) {
      const score = Math.max(0, 10 - state.errors);
      SFX.success();
      const fb = document.getElementById('img-match-feedback');
      if (fb) fb.innerHTML = '<div class="feedback-box ok">🎉 ¡Completaste la actividad! Errores: '+state.errors+' — Calificación: '+score+'/10 <button class="btn btn-success btn-sm" style="margin-left:12px" onclick="exitToTopic(\''+window._imgMatchTopicId+'\')">Continuar →</button></div>';
      saveProgressAndGrade(window._imgMatchTopicId, 'imgvocab', score, 10, score * 10);
    }
  } else {
    SFX.wrong();
    state.errors++;
    [imgEl, wordEl].forEach(el => { if(el){ el.style.borderColor='var(--danger)'; setTimeout(()=>{ el.style.borderColor='var(--gray-200)'; },700); } });
    const fb = document.getElementById('img-match-feedback');
    if (fb) { fb.innerHTML='<div class="feedback-box bad">❌ Esa no es la pareja correcta. ¡Intenta de nuevo!</div>'; setTimeout(()=>{ if(fb) fb.innerHTML=''; },1500); }
  }
  state.selectedImg = undefined;
  state.selectedWord = undefined;
  state.selectedWordValue = undefined;
}

// SOUND ENGINE
// ============================================================
const SFX = {
  correct: () => playTone(523, 0.1, 'sine', 0, 0.15),
  wrong:   () => playTone(200, 0.15, 'sawtooth', 0, 0.18),
  click:   () => playTone(880, 0.05, 'sine', 0, 0.07),
  success: () => { playTone(523,0.08,'sine',0,0.1); setTimeout(()=>playTone(659,0.08,'sine',0,0.1),100); setTimeout(()=>playTone(784,0.1,'sine',0,0.15),200); },
  flip:    () => playTone(440, 0.04, 'sine', 0, 0.08),
  next:    () => playTone(660, 0.05, 'sine', 0, 0.07),
};
function playTone(freq, vol, type, start, dur) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.01);
  } catch(e) {}
}

async function saveStudent(editId=null){
  const name=document.getElementById('st-name').value.trim();
  const username=document.getElementById('st-user').value.trim();
  const password=document.getElementById('st-pass').value.trim();
  const email=document.getElementById('st-email').value.trim();
  const group=document.getElementById('st-group').value.trim();
  const listNum=document.getElementById('st-num').value.trim();
  if(!name||!username||(!editId&&!password)){toast('Completa los campos requeridos','error');return;}
  try{
    let authUid=editId;
    if(!editId){
      toast('Creando cuenta...','info');
      const resp=await fetch(WORKER_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Admin-Secret':ADMIN_SECRET},
        body:JSON.stringify({action:'create',email:username+'@student.blackai.com',password,displayName:name}),
      });
      const result=await resp.json();
      if(!result.ok)throw new Error(result.error||'Error al crear usuario');
      authUid=result.uid;
    }
    if(editId&&password){
      const resp=await fetch(WORKER_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Admin-Secret':ADMIN_SECRET},
        body:JSON.stringify({action:'updatePassword',uid:editId,newPassword:password}),
      });
      const result=await resp.json();
      if(!result.ok)throw new Error(result.error);
    }
    const data={name,username,email,group,listNum,role:'student',authUid};

async function saveAttendance(date){
  if(!window._attState){toast('Sin datos','error');return;}
  await dbSet('attendance/'+date,window._attState);
  const allAtt=await dbGet('attendance');
  if(allAtt){
    const absCount={};
    for(const [d,day] of Object.entries(allAtt)){
      for(const [sid,status] of Object.entries(day)){
        if(status==='A')absCount[sid]=(absCount[sid]||0)+1;
      }
    }
    for(const [sid,count] of Object.entries(absCount)){
      if(count>=3){
        await dbPush('notifications/'+sid,{
          msg:`⚠️ Tienes ${count} faltas. Habla con tu maestro para no perder el derecho a examen.`,
          date:new Date().toISOString(),read:false,type:'warning'
        });
      }
    }
  }
  // ── Auto-calc attendance grade for all students ──
    const [students, sessionsConfig] = await Promise.all([
    dbGet('students'),
    dbGet('config/sessions'),
  ]);
  if (students && allAtt) {
    // Use teacher-configured sessions, else count recorded attendance days
    const configured = sessionsConfig && sessionsConfig[activeParcial]
      ? parseInt(sessionsConfig[activeParcial]) : 0;
    const totalDays = configured > 0 ? configured : (Object.keys(allAtt).length || 1);

    const absCount2 = {};
    for (const [d, day] of Object.entries(allAtt)) {
      for (const [sid, status] of Object.entries(day)) {
        if (status === 'A') absCount2[sid] = (absCount2[sid] || 0) + 1;
        if (status === 'T') absCount2[sid] = (absCount2[sid] || 0) + 0.5;
      }
    }
    for (const sid of Object.keys(students)) {
      const absences  = absCount2[sid] || 0;
      const present   = Math.max(0, totalDays - absences);
      const attGrade  = Math.min(10, (present / totalDays) * 10).toFixed(1);
      const existing  = await dbGet('grades/' + sid + '/' + activeParcial) || {};
      existing.attendance = attGrade;
      // Recalc avg with rubric if exists
      const rubric = await dbGet('rubric');
      if (rubric && rubric.items && rubric.items.length > 0) {
        const fg = await calcFinalGradeWithRubric(sid, activeParcial);
        if (fg !== null) existing.avg = fg.toFixed(1);
      } else {
        const a2 = parseFloat(existing.activities) || 0;
        const b2 = parseFloat(attGrade) || 0;
        const e2 = parseFloat(existing.exam) || 0;
        existing.avg = ((a2 + b2 + e2) / 3).toFixed(1);
      }
      await dbSet('grades/' + sid + '/' + activeParcial, existing);
    }
  }
  SFX.success();
  toast('Asistencia guardada ✅','success');
}

// Updated grade calculator — uses per-criterion evalType
async function calcFinalGradeWithRubric(studentId, parcial) {
  const [rubric, progress, topicConfig, allAtt, grades] = await Promise.all([
    dbGet('rubric'),
    dbGet('progress/' + studentId),
    dbGet('config/activatedTopics'),
    dbGet('attendance'),
    dbGet('grades/' + studentId + '/' + parcial),
  ]);

  if (!rubric || !rubric.items || rubric.items.length === 0) return null;
  const items = rubric.items;
  const totalPct = items.reduce((a, it) => a + (parseFloat(it.pct) || 0), 0);
  if (totalPct === 0) return null;

  // Active topics for this parcial
  const activated = (topicConfig && topicConfig[parcial]) || {};
  const activeTopicIds = Object.keys(activated).filter(id => activated[id] === true);

  let weightedSum = 0;

  for (const item of items) {
    const pct = (parseFloat(item.pct) || 0) / 100;
    const evalType = item.evalType || item.type || 'actividades';
    let score = 0;

    if (evalType === 'actividades') {
      // Average pct across all activated topics / total activated topics
      let totalPctSum = 0;
      for (const topicId of activeTopicIds) {
        const topicProg = progress && progress[topicId];
        if (topicProg) {
          const moduleScores = Object.values(topicProg)
            .filter(m => typeof m.pct === 'number' && !isNaN(m.pct));
          if (moduleScores.length > 0) {
            totalPctSum += moduleScores.reduce((a, m) => a + m.pct, 0) / moduleScores.length;
          }
        }
      }
      const overallPct = activeTopicIds.length > 0 ? totalPctSum / activeTopicIds.length : 0;
      score = overallPct / 10; // 0-10

    } else if (evalType === 'asistencia') {
      // Use stored attendance grade (calculated by saveAttendance)
      score = parseFloat(grades?.attendance) || 0;

    } else if (evalType === 'examen') {
      score = parseFloat(grades?.exam) || 0;

    } else if (evalType === 'participacion') {
      score = parseFloat(grades?.participation) || 0;

    } else {
      score = parseFloat(grades?.[evalType]) || 0;
    }

    weightedSum += Math.min(10, Math.max(0, score)) * pct;
  }

  const finalGrade = (weightedSum / (totalPct / 100));
  return Math.min(10, Math.max(0, parseFloat(finalGrade.toFixed(1))));
}

async function renderStudentPractice(){
  const [progress,topicConfig]=await Promise.all([
    dbGet('progress/'+currentUser.id),
    dbGet('config/activatedTopics'),
  ]);
  const startTopic=window._practiceStartTopic;
  window._practiceStartTopic=null;
  window._cachedProgress=progress;

  const activated=topicConfig&&topicConfig[activeParcial]||{};
  const practiceTopics=TOPICS.filter(t=>activated[t.id]===true);

  if(practiceTopics.length===0){
    document.getElementById('content-area').innerHTML=`
    <div class="card" style="text-align:center;padding:48px 24px">
      <div style="font-size:3rem">📌</div>
      <p class="fw-bold mt-3" style="font-size:1.1rem">Tu maestro aún no ha activado temas para este parcial.</p>
      <p class="text-sm text-gray mt-1">Consulta a tu profesor.</p>
    </div>`;
    return;
  }

  const modules={};
  practiceTopics.forEach(t=>{
    const k=t.module+'|'+t.moduleTitle;
    if(!modules[k])modules[k]=[];
    modules[k].push(t);
  });

  let modulesHtml='';
  for(const [key,topics] of Object.entries(modules)){
    const[,modTitle]=key.split('|');
    modulesHtml+=`<h3 class="section-title">${modTitle}</h3><div class="topics-grid mb-4">`;
    for(const t of topics){
      const done=progress&&progress[t.id]?Object.keys(progress[t.id]).length:0;
      modulesHtml+=`<div class="topic-card tc-${t.color}" id="ptopic-${t.id}" onclick="SFX.click();selectPracticeTopic('${t.id}')">
        <div class="tc-icon">${t.icon}</div>
        <div class="tc-title">Wk ${t.week}: ${t.title}</div>
        <div class="tc-prog" style="font-size:.68rem">${t.grammar}</div>
        <div class="tc-prog">${done}/${ACT_TYPES.length} actividades</div>
        <div style="width:100%;height:5px;background:rgba(0,0,0,.1);border-radius:4px;overflow:hidden;margin-top:4px">
          <div style="height:100%;width:${(done/ACT_TYPES.length)*100}%;background:currentColor;opacity:.7;border-radius:4px"></div>
        </div></div>`;
    }
    modulesHtml+='</div>';
  }

  document.getElementById('content-area').innerHTML=`<div id="practice-list">${modulesHtml}</div><div id="practice-detail"></div>`;
  if(startTopic)setTimeout(()=>selectPracticeTopic(startTopic),80);
}

        return `<div class="module-card" onclick="SFX.click();startActivity('${topicId}','${m.id}')">

function startActivity(topicId, actType) {
  window.speechSynthesis && window.speechSynthesis.cancel();

  if (actType === 'imgvocab')   { renderImgVocab(topicId); return; }
  if (actType === 'imgmcq')     { renderImgMCQ(topicId);   return; }
  if (actType === 'audiovocab') { renderAudioVocab(topicId); return; }
  if (actType === 'explain')    { renderExplain(topicId);   return; }
  if (actType === 'reading')    { renderReadingWithGlossary(topicId); return; }

  // Act 5: MC + Order combo (5+5)
  if (actType === 'mc') {
    startMCOrder(topicId);
    return;
  }

  // Act 6: Build sentences — use EX_DATA fill for now
  if (actType === 'fill') {
    const data = EX_DATA[topicId] || EX_DATA['W1'];
    if (!data || !data.fill) { toast('No hay ejercicios disponibles','error'); return; }
    const allQs = data.fill || [];
    const easy   = allQs.slice(0,5).sort(()=>Math.random()-.5);
    const medium = allQs.slice(5,8).sort(()=>Math.random()-.5);
    const hard   = allQs.slice(8,10).sort(()=>Math.random()-.5);
    const qs = [...easy,...medium,...hard].slice(0,10);
    _exState = { topicId, moduleType:'fill', questions:qs, idx:0, score:0, answers:[] };
    renderExercise();
    return;
  }

  toast('Actividad no disponible','error');
}

function renderFill(q){
  setTimeout(()=>{ const el=document.getElementById('fill-ans'); if(el)el.focus(); }, 80);
  // Detect sentence type from question or blank
  const qLower = (q.q||'').toLowerCase();
  const blankLower = ((Array.isArray(q.blanks)?q.blanks[0]:q.blank)||'').toLowerCase();
  let sentType='📗 Oración Afirmativa', sentColor='var(--success)', sentBg='var(--success-l)';
  if(blankLower.includes('not')||blankLower.includes("n't")||blankLower.includes("n\\'t")){
    sentType='📕 Oración Negativa'; sentColor='var(--danger)'; sentBg='var(--danger-l)';
  } else if(qLower.trim().endsWith('?')||qLower.startsWith('was ')||qLower.startsWith('were ')||
            qLower.startsWith('could ')||qLower.startsWith('did ')||qLower.startsWith('is ')||
            qLower.startsWith('are ')||qLower.startsWith('can ')||qLower.startsWith('will ')){
    sentType='❓ Oración Interrogativa'; sentColor='var(--warning)'; sentBg='var(--warning-l)';
  }
  return `
  <div class="mb-3 p-2 px-3" style="background:${sentBg};border-radius:8px;border-left:4px solid ${sentColor};display:inline-flex;align-items:center;gap:8px">
    <span style="font-weight:800;font-size:.85rem;color:${sentColor}">${sentType}</span>
  </div>
  <div class="ex-question">${q.q}</div>
  <input class="fill-input mt-3" id="fill-ans" placeholder="Escribe la respuesta en inglés..."
    autocomplete="off" spellcheck="false"
    onkeydown="if(event.key==='Enter'){SFX.click();answerFill();}">
  <div class="mt-3"><button class="btn btn-primary" onclick="SFX.click();answerFill()">Verificar ✅</button></div>`;
}
function answerFill(){
  const input=document.getElementById('fill-ans');
  if(!input)return;
  const q=_exState.questions[_exState.idx];
  const given=input.value.trim();

  // Advanced normalisation: collapse all apostrophe variants, lowercase, strip punctuation
  function norm(s){
    return s
      .toLowerCase()
      .replace(/[\u0027\u2019\u2018\u0060\u00B4\uFF07\u02BC]/g, "'") // unify apostrophes
      .replace(/n't/g, " not")          // wasn't → was not (space before not)
      .replace(/\s+/g, ' ')             // collapse spaces
      .trim()
      .replace(/[.,!?;:""«»]/g,'');     // strip trailing punctuation
  }

  // Expand full forms <-> contractions, return array of normalised variants
  function variants(s){
    const n = norm(s);
    const contracted = n
      .replace(/was not/g,"wasn't").replace(/were not/g,"weren't")
      .replace(/could not/g,"couldn't").replace(/cannot/g,"can't")
      .replace(/will not/g,"won't").replace(/did not/g,"didn't")
      .replace(/do not/g,"don't").replace(/does not/g,"doesn't")
      .replace(/is not/g,"isn't").replace(/are not/g,"aren't")
      .replace(/have not/g,"haven't").replace(/has not/g,"hasn't");
    // Also a "no-space" variant for students who omit space: "wasnot" etc.
    const nospace = n.replace(/ not/g,'not');
    const results = [n, contracted, nospace];
    // Strip all apostrophes from each variant too
    results.push(...results.map(v=>v.replace(/'/g,'')));
    return [...new Set(results)];
  }

  const rawAnswers = Array.isArray(q.blanks) ? q.blanks : [q.blank];
  const accepted   = [];
  for(const a of rawAnswers) for(const v of variants(a)) accepted.push(v);

  const givenVariants = variants(given);
  const correct = accepted.some(a => givenVariants.includes(a));

  if(correct){_exState.score++;SFX.correct();}else SFX.wrong();
  _exState.answers.push({correct});
  input.disabled=true;
  input.style.borderColor=correct?'var(--success)':'var(--danger)';
  input.style.background =correct?'var(--success-l)':'var(--danger-l)';
  showFeedback(correct,'Respuesta: '+(Array.isArray(q.blanks)?q.blanks.join(' / '):q.blank));
  setTimeout(()=>{SFX.next();nextQuestion();},1800);
}

function renderOrder(q){
  const shuffled=[...q.words].sort(()=>Math.random()-.5);
  const firstWord = q.ans.trim().split(' ')[0];
  const isQuestion = ['Was','Were','Can','Could','Is','Are','Do','Does','Did','Will','Have','Has']
    .includes(firstWord);
  window._orderState={built:[], isQuestion};
  // ? chip is fixed at the end if it's a question (student must place it last)
  const questionChip = isQuestion
    ? `<span style="display:inline-flex;align-items:center;padding:8px 16px;
        background:var(--warning-l);border:2px solid var(--warning);border-radius:99px;
        font-weight:800;font-size:1rem;color:#92400E;margin:4px;">?</span>`
    : '';
  return `<div class="ex-question">📝 Ordena las palabras para formar una oración${isQuestion?' (es una pregunta ❓)':''}:</div>
  <div class="sentence-builder" id="sb-built"></div>
  <div class="word-bank" id="sb-bank" style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;align-items:center">
    ${shuffled.map((w,i)=>`<button class="word-chip" id="wc-${i}" onclick="SFX.click();addWord('${w.replace(/'/g,"\\'")}',${i})">${w}</button>`).join('')}
    ${questionChip}
  </div>
  <p class="text-xs text-gray mb-2">${isQuestion?'💡 La oración termina con <strong>?</strong> — ya está fijo al final de las opciones.':'💡 Haz clic en las palabras en el orden correcto.'}</p>
  <div class="flex gap-2 mt-2">
    <button class="btn btn-secondary btn-sm" onclick="SFX.click();clearOrder()">🔄 Limpiar</button>
    <button class="btn btn-primary btn-sm" onclick="SFX.click();checkOrder()">Verificar ✅</button>
  </div>`;
}
function addWord(word,idx){
  const chip=document.getElementById('wc-'+idx);
  if(chip)chip.classList.add('used');
  window._orderState.built.push({word,idx});
  const sb=document.getElementById('sb-built');
  if(sb){
    const span=document.createElement('span');
    span.className='sb-word';span.textContent=word;
    span.onclick=()=>removeWord(idx,span);
    sb.appendChild(span);
  }
}
function removeWord(idx,el){
  SFX.click();
  window._orderState.built=window._orderState.built.filter(w=>w.idx!==idx);
  const chip=document.getElementById('wc-'+idx);
  if(chip)chip.classList.remove('used');
  if(el)el.remove();
}
function clearOrder(){
  window._orderState.built=[];
  document.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('used'));
  const sb=document.getElementById('sb-built');if(sb)sb.innerHTML='';
}
function checkOrder(){
  const q=_exState.questions[_exState.idx];
  const built=window._orderState.built.map(w=>w.word).join(' ');
  const correct=built.toLowerCase()===q.ans.toLowerCase();
  if(correct){_exState.score++;SFX.correct();}else SFX.wrong();
  _exState.answers.push({correct});
  showFeedback(correct,'Respuesta: '+q.ans);
  setTimeout(()=>{SFX.next();nextQuestion();},2000);
}

function renderErrorFind(q){
  let sentType = '📗 Afirmativa';
  if(q.sentence.some(w=>['not',"wasn't","weren't","couldn't","isn't","aren't","don't","doesn't","didn't"].includes(w.toLowerCase())))
    sentType = '📕 Negativa';
  if(['was','were','is','are','can','could','did','do','does','will','have','has'].includes(q.sentence[0]?.toLowerCase()))
    sentType = '❓ Interrogativa';
  window._selectedError = undefined;
  return `<div class="ex-question">🔍 Encuentra la palabra incorrecta — ${sentType}:</div>
  <div class="mt-3 mb-3 p-4" style="background:#f8fafc;border-radius:12px;font-size:1.2rem;line-height:2;display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:64px">
    ${q.sentence.map((w,i)=>`<button id="ew-${i}" onclick="SFX.click();selectError(${i})"
      style="padding:8px 14px;border-radius:8px;border:2px solid var(--gray-200);cursor:pointer;
             font-weight:700;font-size:1.05rem;transition:all .18s;background:#fff;

  </div>

  <button class="btn btn-primary btn-sm" onclick="SFX.click();checkError()">Verificar ✅</button>`;
}
function selectError(idx){
  // Reset all error word buttons
  _exState.questions[_exState.idx].sentence.forEach((_,i)=>{
    const b=document.getElementById('ew-'+i);
    if(b){ b.style.borderColor='var(--gray-200)'; b.style.background='#fff'; b.style.color='var(--gray-800)'; b.style.transform=''; }
  });
  window._selectedError=idx;
  const el=document.getElementById('ew-'+idx);
  if(el){ el.style.borderColor='var(--danger)'; el.style.background='var(--danger-l)'; el.style.color='var(--danger-d)'; el.style.transform='scale(1.05)'; }
}
function checkError(){
  const q=_exState.questions[_exState.idx];
  const selected=window._selectedError;
  if(selected===undefined){toast('Selecciona una palabra','warning');return;}
  const correct=selected===q.errorIdx;
  if(correct){_exState.score++;SFX.correct();}else SFX.wrong();
  _exState.answers.push({correct});
  showFeedback(correct,`La palabra "${q.sentence[q.errorIdx]}" debía ser "${q.correct}"`);
  setTimeout(()=>{SFX.next();nextQuestion();},2200);
}
