function answerReadingQ(qi, oi, correctIdx) {
  const state = window._readingState;
  if (!state) return;
  // Prevent re-answering
  if (state.answered && state.answered[qi]) return;
  if (!state.answered) state.answered = {};
  state.answered[qi] = true;
  SFX.click();

  const correct = oi === correctIdx;
  state.answers = state.answers || {};
  state.answers[qi] = oi;

  // Visual feedback on all buttons for this question
  const q = document.querySelectorAll(`[id^="rq-${qi}-"]`);
  q.forEach(btn => {
    const btnIdx = parseInt(btn.id.split('-')[2]);
    btn.disabled = true;
    btn.style.cursor = 'default';
    if (btnIdx === correctIdx) {
      btn.style.borderColor = 'var(--success)';
      btn.style.background  = 'var(--success-l)';
      btn.style.color       = 'var(--success-d)';
    } else if (btnIdx === oi && !correct) {
      btn.style.borderColor = 'var(--danger)';
      btn.style.background  = 'var(--danger-l)';
      btn.style.color       = 'var(--danger-d)';
    }
  });

  if (correct) SFX.correct(); else SFX.wrong();

  // Check if all answered
  const totalQs = document.querySelectorAll('[id^="rq-0-"]').length > 0
    ? document.querySelectorAll('[class*="rq-group"]').length
    : Object.keys(state.answered).length;
  const submitBtn = document.getElementById('submit-reading-btn');
  if (submitBtn && Object.keys(state.answered).length > 0) {
    submitBtn.textContent = `✅ Verificar (${Object.keys(state.answered).length} respondidas)`;
  }
}

async function submitReading(topicId){
  const state=window._readingState;
  // Get the reading data - could be custom or built-in
  const saved=await dbGet('act6/'+topicId);
  const data=(saved&&saved.reading)||READING_DATA[topicId];
  if(!data)return;
  const total=data.questions.length;
  const answered=Object.keys(state.answers).length;
  if(answered<total){toast(`Responde las ${total} preguntas primero`,'warning');return;}
  let score=0;
  data.questions.forEach((q,qi)=>{
    const chosen=state.answers[qi];
    const correct=chosen===q.ans;
    if(correct)score++;
    document.querySelectorAll(`[id^="rq-${qi}-"]`).forEach((b,oi)=>{
      b.disabled=true;
      if(oi===q.ans)b.classList.add('correct');
      else if(oi===chosen&&!correct)b.classList.add('wrong');
    });
  });
  const pct2=Math.round((score/total)*100);
  await saveProgressAndGrade(topicId,'reading',score,total,pct2);
  const stars=score/total>=.9?'⭐⭐⭐':score/total>=.7?'⭐⭐':'⭐';
  SFX.success();
  toast(`Lectura completada: ${score}/${total} ${stars}`,'success');
  const btn=document.getElementById('submit-reading-btn');
  if(btn){btn.textContent=`✅ Resultado: ${score}/${total} ${stars}`;btn.disabled=true;btn.className='btn btn-success mt-3';}
}

function renderCompose(q) {
  // Shuffle each column independently so correct answer is NOT always first
  function shuffleWithCorrect(opts, correctIdx) {
    const correct = opts[correctIdx];
    const shuffled = [...opts].sort(() => Math.random() - .5);
    const newIdx = shuffled.indexOf(correct);
    return { shuffled, newIdx };
  }
  const subj = shuffleWithCorrect(q.subjects, q.subjectAns);
  const verb = shuffleWithCorrect(q.verbs, q.verbAns);
  const comp = shuffleWithCorrect(q.complements, q.complementAns);

  window._composeState = { subject: null, verb: null, complement: null };
  window._composeCorrect = { subject: subj.newIdx, verb: verb.newIdx, complement: comp.newIdx };

  function optBtns(opts, part, correctIdx) {
    return opts.map((o, i) =>
      `<button id="comp-${part}-${i}" onclick="selectComposePart('${part}',${i})"
        style="padding:9px 14px;border:2px solid var(--gray-200);border-radius:8px;
               background:#fff;font-weight:700;font-size:.88rem;cursor:pointer;
               transition:all .18s;color:var(--gray-800);margin:4px;white-space:nowrap">
        ${o}
      </button>`
    ).join('');
  }

  return `<div class="ex-question">✍️ Elige la parte correcta para cada columna y forma la oración:</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px">
    <div>
      <div class="text-xs fw-bold text-gray mb-2" style="text-align:center;letter-spacing:1px;padding:6px;background:var(--blue-light);border-radius:6px">👤 SUJETO</div>
      <div id="comp-subject-area" style="display:flex;flex-direction:column;gap:4px">${optBtns(subj.shuffled, 'subject', subj.newIdx)}</div>
    </div>
    <div>
      <div class="text-xs fw-bold text-gray mb-2" style="text-align:center;letter-spacing:1px;padding:6px;background:var(--green-light);border-radius:6px">⚡ VERBO</div>
      <div id="comp-verb-area" style="display:flex;flex-direction:column;gap:4px">${optBtns(verb.shuffled, 'verb', verb.newIdx)}</div>
    </div>
    <div>
      <div class="text-xs fw-bold text-gray mb-2" style="text-align:center;letter-spacing:1px;padding:6px;background:var(--orange-light);border-radius:6px">📝 COMPLEMENTO</div>
      <div id="comp-comp-area" style="display:flex;flex-direction:column;gap:4px">${optBtns(comp.shuffled, 'complement', comp.newIdx)}</div>
    </div>
  </div>
  <div id="comp-preview" class="mt-4 p-3" style="background:#f8fafc;border-radius:10px;border:2px dashed var(--gray-200);min-height:52px;display:flex;align-items:center;justify-content:center">
    <span class="text-sm text-gray">Tu oración aparecerá aquí...</span>
  </div>
  <div class="mt-3"><button class="btn btn-primary" onclick="SFX.click();checkCompose()">Verificar ✅</button></div>`;
}

function selectComposePart(part, idx) {
  SFX.click();
  const correctIdx = window._composeCorrect[part];
  // Deselect others in same group
  document.querySelectorAll(`[id^="comp-${part}-"]`).forEach(b => {
    b.style.borderColor = 'var(--gray-200)';
    b.style.background = '#fff';
    b.style.color = 'var(--gray-800)';
  });
  const btn = document.getElementById(`comp-${part}-${idx}`);
  if (btn) {
    btn.style.borderColor = 'var(--primary)';
    btn.style.background = 'var(--primary-l)';
    btn.style.color = 'var(--primary-d)';
  }
  window._composeState[part] = { idx, correctIdx, text: btn?.textContent?.trim() || '' };
  // Update preview
  const s = window._composeState;
  const preview = document.getElementById('comp-preview');
  if (preview) {
    const parts = [s.subject?.text, s.verb?.text, s.complement?.text].filter(Boolean);
    if (parts.length > 0) {
      preview.innerHTML = `<span style="font-size:1.05rem;font-weight:700;color:var(--gray-800)">${parts.join(' ')}</span>`;
    }
  }
}

function checkCompose() {
  const state = window._composeState;
  if (!state.subject || !state.verb || !state.complement) {
    toast('Selecciona una opción de cada columna', 'warning'); return;
  }
  const correct =
    state.subject.idx === window._composeCorrect.subject &&
    state.verb.idx === window._composeCorrect.verb &&
    state.complement.idx === window._composeCorrect.complement;

  if (correct) { _exState.score++; SFX.correct(); }
  else SFX.wrong();
  _exState.answers.push({ correct });

  // Highlight correct/wrong
  ['subject','verb','complement'].forEach(part => {
    const sel = state[part];
    const corIdx = window._composeCorrect[part];
    const selBtn = document.getElementById(`comp-${part}-${sel.idx}`);
    const corBtn = document.getElementById(`comp-${part}-${corIdx}`);
    if (corBtn) { corBtn.style.borderColor='var(--success)'; corBtn.style.background='var(--success-l)'; corBtn.style.color='var(--success-d)'; }
    if (selBtn && sel.idx !== corIdx) { selBtn.style.borderColor='var(--danger)'; selBtn.style.background='var(--danger-l)'; selBtn.style.color='var(--danger-d)'; }
  });

  const q = _exState.questions[_exState.idx];
  const cSub = document.getElementById('comp-subject-'+window._composeCorrect.subject)?.textContent?.trim()||'';
  const cVrb = document.getElementById('comp-verb-'+window._composeCorrect.verb)?.textContent?.trim()||'';
  const cCmp = document.getElementById('comp-complement-'+window._composeCorrect.complement)?.textContent?.trim()||'';
  const correctSentence = [cSub,cVrb,cCmp].filter(Boolean).join(' ');
  showFeedback(correct, 'Oración correcta: ' + correctSentence);
  setTimeout(() => { SFX.next(); nextQuestion(); }, 2200);
}

// Find best English voice available
function getBestEnglishVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Priority: Microsoft Neural > Google > any en-US > any en
  const priority = [
    v => v.name.includes('Microsoft') && v.name.includes('Neural') && v.lang.startsWith('en'),
    v => v.name.includes('Microsoft') && v.lang === 'en-US',
    v => v.name.includes('Google') && v.lang === 'en-US',
    v => v.lang === 'en-US',
    v => v.lang.startsWith('en-'),
    v => v.lang.startsWith('en'),
  ];
  for (const test of priority) {
    const found = voices.find(test);
    if (found) return found;
  }
  return voices[0] || null;
}

function speakSentence(text, onEnd) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.85;  // slightly slower for learning
  utt.pitch = 1;
  const voice = getBestEnglishVoice();
  if (voice) utt.voice = voice;
  if (onEnd) utt.onend = onEnd;
  window.speechSynthesis.speak(utt);
}

function playListenAudio(slow) {
  const state = window._listenState;
  if (!state) return;
  const btn = document.getElementById('listen-play-btn');

  utt.rate = slow ? 0.6 : 0.85;
  utt.pitch = 1;
  const voice = getBestEnglishVoice();
  if (voice) utt.voice = voice;
  utt.onend = () => {
    if (btn) btn.style.opacity = '1';
    if (status) status.textContent = '';
  };
  utt.onerror = () => {
    if (btn) btn.style.opacity = '1';
    if (status) status.textContent = '⚠️ Error de audio';
  };
  window.speechSynthesis.cancel();
  // Small delay needed for Chrome
  setTimeout(() => window.speechSynthesis.speak(utt), 100);
  SFX.click();
}

function addListenWord(word, idx) {
  const chip = document.getElementById('lw-' + idx);
  if (chip) { chip.style.opacity = '.3'; chip.style.pointerEvents = 'none'; }
  
  window._listenState.built.push({ word, idx });
  
  const placeholder = document.getElementById('sb-listen-placeholder');
  if (placeholder) placeholder.style.display = 'none';
  
  const area = document.getElementById('sb-listen-built');
  if (area) {
    const span = document.createElement('span');
    span.style.cssText = 'padding:8px 16px;background:var(--primary);color:#fff;border-radius:99px;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .15s';
    span.textContent = word;
    span.onclick = () => removeListenWord(idx, span);
    area.appendChild(span);
  }
}

function removeListenWord(idx, el) {
  SFX.click();
  window._listenState.built = window._listenState.built.filter(w => w.idx !== idx);
  const chip = document.getElementById('lw-' + idx);
  if (chip) { chip.style.opacity = '1'; chip.style.pointerEvents = 'auto'; }
  if (el) el.remove();
  if (window._listenState.built.length === 0) {
    const placeholder = document.getElementById('sb-listen-placeholder');
    if (placeholder) placeholder.style.display = '';
  }
}

function clearListenOrder() {
  const state = window._listenState;
  if (!state) return;
  state.built = [];
  document.querySelectorAll('[id^="lw-"]').forEach(c => {
    c.style.opacity = '1'; c.style.pointerEvents = 'auto';
  });
  const area = document.getElementById('sb-listen-built');
  if (area) {
    area.innerHTML = '<span class="text-sm text-gray" id="sb-listen-placeholder">Tu respuesta aparecerá aquí...</span>';
  }
}

function checkListenOrder() {
  const state = window._listenState;
  if (!state) return;
  const built = state.built.map(w => w.word).join(' ');
  const correct = built.toLowerCase().replace(/[?!.]/g,'') === state.correct.toLowerCase().replace(/[?!.]/g,'');
  if (correct) { _exState.score++; SFX.correct(); }
  else SFX.wrong();
  _exState.answers.push({ correct });
  // Play the correct sentence
  speakSentence(state.correct);
  showFeedback(correct, 'Respuesta: ' + state.correct);
  setTimeout(() => { SFX.next(); nextQuestion(); }, 2400);
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    window.speechSynthesis.getVoices(); // cache voices
  });
}

async function renderImgMCQ(topicId) {
  const topic  = TOPICS.find(t => t.id === topicId);
  const saved  = await dbGet('act6/' + topicId);
  const vocab  = (saved && saved.vocab ? saved.vocab : (IMGVOCAB_DATA[topicId]?.words||[]).map(w=>({word:w,es:'',imageUrl:''}))).filter(v=>v.word&&v.imageUrl);

  if (vocab.length < 3) {
    document.getElementById('content-area').innerHTML = `
    <div class="ex-container"><div class="ex-header">
      <button class="btn btn-secondary btn-sm" onclick="exitToTopic('${topicId}')">← Salir</button>
      <span class="badge badge-blue">🔍 Act. 2</span></div>
    <div class="card mt-3 text-center" style="padding:40px">
      <div style="font-size:3rem">🖼️</div>
      <p class="fw-bold mt-3">Necesitas al menos 3 imágenes para esta actividad.</p>
      <p class="text-sm text-gray mt-1">El docente debe agregar imágenes en el editor.</p>
    </div></div>`;
    return;
  }

  // Build 10 questions from vocab (cycle if < 10)
  const questions = [];
  for (let i = 0; i < 10; i++) {
    const correct = vocab[i % vocab.length];
    // 3 distractors from other words
    const others = vocab.filter(v => v.word !== correct.word).sort(() => Math.random()-.5).slice(0,3);
    const opts = [correct, ...others].sort(() => Math.random()-.5);
    const ans  = opts.findIndex(o => o.word === correct.word);
    questions.push({ imageUrl: correct.imageUrl, es: correct.es, opts: opts.map(o=>o.word), ans, word: correct.word });
  }

  _exState = { topicId, moduleType:'imgmcq', questions, idx:0, score:0, answers:[] };
  renderExercise();
}

async function renderAudioVocab(topicId){
  const topic=TOPICS.find(t=>t.id===topicId);
  const saved=await dbGet('act6/'+topicId);
  const vocab=(saved&&saved.vocab?saved.vocab:(IMGVOCAB_DATA[topicId]?.words||[]).map(w=>({word:w,es:'',imageUrl:''}))).filter(v=>v.word);
  if(vocab.length<3){
    document.getElementById('content-area').innerHTML=`
    <div class="ex-container"><div class="ex-header">
      <button class="btn btn-secondary btn-sm" onclick="exitToTopic('${topicId}')">← Salir</button>
      <span class="badge badge-purple">🔊 Act. 3</span></div>
    <div class="card mt-3 text-center" style="padding:40px">
      <p class="fw-bold mt-3">Necesitas vocabulario configurado.</p>
    </div></div>`;
    return;
  }
  const questions=[];
  // 6 word MCQ questions
  const wordPool=[...vocab].sort(()=>Math.random()-.5).slice(0,Math.min(6,vocab.length));
  for(const correct of wordPool){
    const others=vocab.filter(v=>v.word!==correct.word).sort(()=>Math.random()-.5).slice(0,3);
    const opts=[correct,...others].sort(()=>Math.random()-.5);
    const ans=opts.findIndex(o=>o.word===correct.word);
    questions.push({type:'word',word:correct.word,opts:opts.map(o=>o.word),ans});
  }
  // 4 sentence order questions from EX_DATA
  const exData=EX_DATA[topicId]||EX_DATA['W1'];
  const orderPool=(exData.order||[]).slice(0,8).sort(()=>Math.random()-.5).slice(0,4);
  for(const q of orderPool){
    questions.push({type:'sentence',sentence:q.ans,words:[...q.words].sort(()=>Math.random()-.5),ans:q.ans});
  }
  _exState={topicId,moduleType:'audiovocab',questions,idx:0,score:0,answers:[]};
  renderExercise();
}

function getGrammarStructure(grammar) {
  const g = grammar.toLowerCase();
  if (g.includes('negative') && g.includes('be')) return '<span style="color:var(--blue)">Subject</span> + <span style="color:var(--danger)">was / were + not</span> + <span style="color:var(--green)">complement</span><br>Ej: She <span style="color:var(--danger)">was not</span> at home.';
  if (g.includes('interrogative') && g.includes('be')) return '<span style="color:var(--danger)">Was / Were</span> + <span style="color:var(--blue)">subject</span> + <span style="color:var(--green)">complement</span> + <span style="color:var(--orange)">?</span><br>Ej: <span style="color:var(--danger)">Were</span> they at school?';
  if (g.includes('could')) return '<span style="color:var(--blue)">Subject</span> + <span style="color:var(--purple)">could / could not</span> + <span style="color:var(--green)">verb</span><br>Ej: She <span style="color:var(--purple)">could</span> swim very well.';
  if (g.includes('there was')) return '<span style="color:var(--danger)">There was</span> (singular) / <span style="color:var(--danger)">There were</span> (plural) + noun<br>Ej: <span style="color:var(--danger)">There was</span> a park in the city.';
  if (g.includes('going to')) return '<span style="color:var(--blue)">Subject</span> + <span style="color:var(--orange)">is/are going to</span> + <span style="color:var(--green)">verb</span><br>Ej: She <span style="color:var(--orange)">is going to</span> visit the museum.';
  if (g.includes('comparativ')) return '<span style="color:var(--blue)">Adj + er</span> than / <span style="color:var(--purple)">more + adj</span> than<br>Ej: This movie is <span style="color:var(--blue)">more exciting</span> than that one.';
  if (g.includes('superlativ')) return 'the + <span style="color:var(--purple)">adj + est</span> / the most + adj<br>Ej: It was <span style="color:var(--purple)">the best</span> concert ever.';
  if (g.includes('as...as')) return '<span style="color:var(--blue)">as</span> + adjective + <span style="color:var(--blue)">as</span><br>Ej: She is <span style="color:var(--blue)">as tall as</span> her brother.';
  if (g.includes('can')) return '<span style="color:var(--blue)">Subject</span> + <span style="color:var(--green)">can / cannot</span> + <span style="color:var(--orange)">verb</span><br>Ej: You <span style="color:var(--green)">can</span> find a pharmacy here.';
  return `<span style="color:var(--gray-600)">${grammar}</span>`;
}

function selectMatchWord(lang, word, idx) {
  const state = window._matchState;
  if (!state) return;
  SFX.click();

  const btnId = lang + '-' + idx;
  const btn   = document.getElementById(btnId);
  if (!btn || btn.disabled) return;

  if (!state.selected) {
    // First selection
    state.selected = { lang, word, idx, btnId };
    btn.style.borderColor = 'var(--primary)';
    btn.style.background  = 'var(--primary-l)';
    btn.style.color       = 'var(--primary-d)';
  } else {
    if (state.selected.lang === lang) {
      // Same column — switch selection
      const prev = document.getElementById(state.selected.btnId);
      if (prev) { prev.style.borderColor='var(--gray-200)'; prev.style.background='#fff'; prev.style.color='var(--gray-800)'; }
      state.selected = { lang, word, idx, btnId };
      btn.style.borderColor = 'var(--primary)';
      btn.style.background  = 'var(--primary-l)';
      btn.style.color       = 'var(--primary-d)';
      return;
    }
    // Check if pair matches
    const enWord  = lang === 'en' ? word : state.selected.word;
    const esWord  = lang === 'es' ? word : state.selected.word;
    const correct = state.pairs.some(p => p.en === enWord && p.es === esWord);

    const prevBtn = document.getElementById(state.selected.btnId);
    if (correct) {
      SFX.correct();
      [btn, prevBtn].forEach(b => { if(b){ b.disabled=true; b.style.borderColor='var(--success)'; b.style.background='var(--success-l)'; b.style.color='var(--success-d)'; b.innerHTML = b.innerHTML.replace('🔵','✅').replace('🟠','✅'); } });
      state.matched.push(enWord);
      state.selected = null;
      // Check if all matched
      if (state.matched.length >= state.pairs.length) {
        const errs = state.errors;
        // Score this round: 5 pairs, lose 1 point per error, min 0
        const roundScore = Math.max(0, 5 - errs);
        _exState.score = (_exState.score || 0) + roundScore;
        _exState.answers = _exState.answers || [];
        _exState.answers.push({ correct: errs === 0, roundScore });
        const msg = errs === 0 ? '¡Perfecto! Sin errores 🌟' : `${errs} error(es) — ${roundScore}/5 en esta ronda`;
        showFeedback(errs === 0, msg);
        setTimeout(() => { SFX.next(); nextQuestion(); }, 1800);
      }
    } else {
      SFX.wrong();
      state.errors++;
      [btn, prevBtn].forEach(b => { if(b){ b.style.borderColor='var(--danger)'; b.style.background='var(--danger-l)'; b.style.color='var(--danger-d)'; setTimeout(()=>{ b.style.borderColor='var(--gray-200)'; b.style.background='#fff'; b.style.color='var(--gray-800)'; },700); } });
      state.selected = null;
    }
  }
}

// ============================================================
// AUTO-GRADE ACTIVITIES — updates activities grade automatically
// based on completed active activities
// ============================================================
async function updateActivityGradeForStudent(studentId, parcial) {
  // Load progress + topic config (which topics are active for this parcial)
  const [progress, topicConfig] = await Promise.all([
    dbGet('progress/' + studentId),
    dbGet('config/activatedTopics'),
  ]);

  // Get topics activated for this parcial
  const activated = (topicConfig && topicConfig[parcial]) || {};
  const activeTopicIds = Object.keys(activated).filter(id => activated[id] === true);

  if (activeTopicIds.length === 0) {
    // No topics configured yet — nothing to calculate
    return;
  }

  // For each active topic, average the pct scores of completed modules
  let totalPct = 0;
  let countedTopics = 0;

  for (const topicId of activeTopicIds) {
    const topicProgress = progress && progress[topicId];
    if (!topicProgress) continue;

    const moduleScores = Object.values(topicProgress)
      .filter(m => typeof m.pct === 'number' && !isNaN(m.pct));

    if (moduleScores.length > 0) {
      const topicAvgPct = moduleScores.reduce((a, m) => a + m.pct, 0) / moduleScores.length;
      totalPct += topicAvgPct;
      countedTopics++;
    }
  }

  // Grade = avg pct across all active topics that have ANY progress / total active topics
  // (topics with no progress count as 0 toward the total)
  const overallPct = totalPct / activeTopicIds.length;
  const activitiesGrade = (overallPct / 10).toFixed(1); // pct 0-100 → grade 0-10

  // Save to grades/studentId/parcial
  const existing = await dbGet('grades/' + studentId + '/' + parcial) || {};
  existing.activities = activitiesGrade;

  // Recalculate rubric-weighted avg if rubric exists
  const rubric = await dbGet('rubric');
  if (rubric && rubric.items && rubric.items.length > 0) {
    const finalGrade = await calcFinalGradeWithRubric(studentId, parcial);
    if (finalGrade !== null) {
      existing.avg = finalGrade.toFixed(1);
    }
  } else {
    // Simple average fallback
    const a = parseFloat(activitiesGrade) || 0;
    const b = parseFloat(existing.attendance) || 0;
    const e = parseFloat(existing.exam) || 0;
    const divisor = [a, b, e].filter(x => x > 0).length || 1;
    existing.avg = ((a + b + e) / 3).toFixed(1);
  }

  await dbSet('grades/' + studentId + '/' + parcial, existing);
}

  // Rubric summary for current parcial
  const rubricSummary = hasRubric ? `
    <div class="card mb-3" style="border-left:4px solid var(--purple);background:var(--purple-l);padding:14px 18px">
      <div class="flex justify-between items-center flex-wrap gap-2">
        <span class="fw-bold text-sm">📏 Ponderación de Rúbrica activa:</span>
        <div class="flex flex-wrap gap-2">
          ${rubricItems.map(it => `<span class="badge badge-purple">${it.name}: ${it.pct}%</span>`).join('')}
        </div>
      </div>
      <p class="text-xs text-gray mt-1">Actividades en este parcial: <strong>${actsPerParcial[activeParcial] || 0}</strong> activas · El promedio 📏 se calcula usando la rúbrica.</p>
    </div>` : '';

  document.getElementById('content-area').innerHTML = `
  ${rubricSummary}
  <div class="card">
    <div class="flex justify-between items-center mb-4">
      <h3 class="section-title mb-0">📝 Calificaciones – ${parcialLabel}</h3>
      <div class="parcial-tabs">
        ${['p1', 'p2', 'p3'].map(p =>
          `<button class="parcial-tab${activeParcial === p ? ' active' : ''}" onclick="SFX.click();activeParcial='${p}';renderGrades()">
            ${p === 'p1' ? '1er' : p === 'p2' ? '2do' : 'Final'}
          </button>`
        ).join('')}
      </div>
    </div>
    <table>
      <thead><tr><th>Alumno</th><th>Grupo</th><th>Actividades</th><th>Asistencia</th><th>Examen</th><th>Promedio</th><th>Acción</th></tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>
  </div>`;
}

// ============================================================
// ADMIN: ACTIVITIES — split by parcial with counts
// ============================================================
async function renderActivities() {
  const activities = await dbGet('activities');
  const actList = activities ? Object.entries(activities) : [];

  // Group by parcial
  const byParcial = { p1: [], p2: [], p3: [] };
  actList.forEach(([id, a]) => {
    const p = a.parcial || 'p1';
    if (!byParcial[p]) byParcial[p] = [];
    byParcial[p].push([id, a]);
  });

  function actRow([id, a]) {
    const topic = TOPICS.find(t => t.id === a.topic);
    const isActive = a.active !== false;
    return `<tr style="${isActive ? '' : 'opacity:.5'}">
      <td><strong>${a.title}</strong>${a.desc ? `<br><small class="text-gray">${a.desc}</small>` : ''}</td>
      <td>${topic ? `<span class="badge badge-blue">${topic.icon} Wk${topic.week}</span>` : '--'}</td>
      <td><span class="badge ${a.type==='app'?'badge-green':'badge-purple'}">${a.type==='app'?'🤖 App':'✏️ Manual'}</span></td>
      <td>
        <button class="btn btn-sm ${isActive?'btn-success':'btn-secondary'}" onclick="toggleActivityVisible('${id}',${isActive})">
          ${isActive ? '👁️ Activa' : '🙈 Oculta'}
        </button>
      </td>
      <td>
        <button class="btn btn-primary btn-xs" onclick="SFX.click();editActivity('${id}')">✏️</button>
        <button class="btn btn-danger btn-xs" onclick="SFX.click();deleteActivity('${id}','${(a.title||'').replace(/'/g,"\\'")}')">🗑️</button>
      </td>
    </tr>`;
  }

  function parcialSection(key, label, color) {
    const acts = byParcial[key] || [];
    const activeCount = acts.filter(([,a]) => a.active !== false).length;
    return `
    <div class="card mb-4">
      <div class="flex justify-between items-center mb-3">
        <h3 class="section-title mb-0">
          <span class="badge badge-${color}" style="font-size:.9rem;padding:6px 14px">${label}</span>
          <span class="text-sm text-gray" style="font-weight:600;margin-left:8px">${activeCount} activas / ${acts.length} total</span>
        </h3>
      </div>
      ${acts.length === 0
        ? `<p class="text-sm text-gray">Sin actividades para este parcial. <button class="btn btn-primary btn-xs" onclick="openAddActivity()">Agregar</button></p>`
        : `<table>
            <thead><tr><th>Título</th><th>Tema</th><th>Tipo</th><th>Visible</th><th>Acciones</th></tr></thead>
            <tbody>${acts.map(actRow).join('')}</tbody>
           </table>`}
    </div>`;
  }

  document.getElementById('content-area').innerHTML = `
  <div class="flex justify-between items-center mb-4">
    <h3 style="font-family:'Fredoka',cursive;font-size:1.3rem">🎯 Actividades (${actList.length} total)</h3>
    <button class="btn btn-primary" onclick="SFX.click();openAddActivity()">➕ Nueva Actividad</button>
  </div>
  ${parcialSection('p1','1er Parcial','blue')}
  ${parcialSection('p2','2do Parcial','orange')}
  ${parcialSection('p3','Final','green')}`;
}






// ── Mobile sidebar toggle ─────────────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  if(!sb)return;
  const isOpen=sb.classList.contains('mobile-open');
  if(isOpen){
    sb.classList.remove('mobile-open');
    if(ov)ov.classList.remove('active');
  } else {
    sb.classList.add('mobile-open');
    if(ov)ov.classList.add('active');
  }
}
function closeSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  if(sb)sb.classList.remove('mobile-open');
  if(ov)ov.classList.remove('active');
}

// ── Global keyboard shortcuts ─────────────────────────────────
document.addEventListener('keydown', function(e){
  if(!_exState || !_exState.moduleType) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const mod = _exState.moduleType;
  // 1-4 / A-D: MCQ (mc, imgmcq, audiovocab)
  if(mod==='mc'||mod==='imgmcq'||mod==='audiovocab'){
    const keyMap={'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3};
    const k=e.key.toLowerCase();
    if(keyMap[k]!==undefined){ e.preventDefault(); SFX.click(); answerMC(keyMap[k]); }
  }
  // Space: audio
  if(e.key===' '){
    if(mod==='audiovocab'&&_exState.questions){
      e.preventDefault();
      const q=_exState.questions[_exState.idx];
      if(q&&q.type==='sentence'&&q.sentence) speakSentence(q.sentence);
      else if(q&&q.word) speakSentence(q.word);
    }
    if(mod==='listen'){ e.preventDefault(); playListenAudio(); }
  }
  // Enter: verify
  if(e.key==='Enter'){
    if(mod==='fill')    { e.preventDefault(); SFX.click(); answerFill(); }
    else if(mod==='order')  { e.preventDefault(); SFX.click(); checkOrder(); }
    else if(mod==='error')  { e.preventDefault(); SFX.click(); checkError(); }
    else if(mod==='listen') { e.preventDefault(); SFX.click(); checkListenOrder(); }
    else if(mod==='audiovocab'&&_exState.questions&&_exState.questions[_exState.idx]?.type==='sentence')
                            { e.preventDefault(); SFX.click(); checkAudioSentence(); }
  }
  // Backspace: clear
  if(e.key==='Backspace'){
    if(mod==='order') { e.preventDefault(); clearOrder(); }
    if(mod==='listen'||mod==='audiovocab'){ e.preventDefault(); clearListenOrder(); }
  }
  // Escape: exit
  if(e.key==='Escape'){
    e.preventDefault();
    if(_exState&&_exState.topicId&&confirm('¿Salir de la actividad?')) exitToTopic(_exState.topicId);
  }
});
</script>
